function buildGroupDonut(){
  const f=chartFont();
  const map=sportMapFor(S.raw);
  const sorted=Object.entries(map).map(([k,v])=>[k,v.total]).sort((a,b)=>b[1]-a[1]);
  const top=sorted.slice(0,8), rest=sorted.slice(8).reduce((s,[,c])=>s+c,0);
  const labels=top.map(s=>s[0]).concat(rest?['기타']:[]);

// 멤버별 요일 성향 비교 (행 정규화 히트맵)
function buildWeekdayCompare(){
  const data={}; MEMBERS.forEach(n=>data[n]=[0,0,0,0,0,0,0]);
  for(const e of S.raw)for(const n of Object.keys(e.data)){if(data[n])data[n][new Date(e.date).getDay()]++;}
  const rows=MEMBERS.map(name=>{
    const arr=data[name], tot=arr.reduce((a,b)=>a+b,0)||1;
    const peak=arr.indexOf(Math.max(...arr));
    const cells=arr.map((v,i)=>{
      const pct=v/tot*100;
      const alpha=Math.min(1,pct/35);
      const bg=v===0?'var(--surface2)':`color-mix(in srgb, var(--accent) ${Math.round(alpha*85)}%, transparent)`;
      return `<td style="text-align:center;padding:0"><div title="${name} ${DOW_KR[i]}요일: ${v}회 (${pct.toFixed(0)}%)" style="margin:2px;height:30px;border-radius:7px;background:${bg};border:1px solid ${i===peak&&v>0?'var(--accent)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'DM Mono',monospace;font-weight:700;color:${pct>=22?'#fff':'var(--muted)'}">${v||''}</div></td>`;
    }).join('');
    return `<tr><td style="font-weight:700;font-size:12.5px;white-space:nowrap;padding-right:8px"><span class="av-sm" style="background:${avatarColor(name)}">${initial(name)}</span>${name}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('weekdayCompare').innerHTML=`
    <table style="width:100%;border-collapse:collapse;min-width:520px">
      <thead><tr><th style="width:80px"></th>${DOW_KR.map((d,i)=>`<th style="text-align:center;font-size:11px;font-weight:600;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--muted)'};padding-bottom:6px">${d}</th>`).join('')}</tr></thead>

}

  const f=chartFont(); const year=m.slice(0,4);

  const isCur=year===String(NOW.getFullYear());

  const yms=[]; for(let mo=1;mo<=maxMo;mo++){const ym=`${year}-${String(mo).padStart(2,'0')}`;if(S.monthly[ym])yms.push(ym);}
  if(!yms.length)return;
  const cumul=MEMBERS.map(n=>yms.reduce((s,ym)=>s+(S.monthly[ym]?.[n]||0),0));
  const remain=MEMBERS.map((n,i)=>Math.max(0,(S.stats.target[n]||0)-cumul[i]));
  const rate=MEMBERS.map((n,i)=>{const t=S.stats.target[n]||1;return parseFloat((cumul[i]/t*100).toFixed(1));});
  const ds=[
    {label:'누적 운동',data:cumul,backgroundColor:MEMBERS.map((_,i)=>MEM_COLORS[i]),borderWidth:0,borderRadius:3,yAxisID:'y',stack:'s'},

    {label:'달성률(%)',type:'line',data:rate,borderColor:f.amber,backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:f.amber,tension:.3,yAxisID:'y2',order:0},
  ];
  if(isCur)ds.push({label:`기준 ${yearPct}%`,type:'line',data:MEMBERS.map(()=>parseFloat(yearPct)),borderColor:f.red,borderWidth:1.5,borderDash:[5,4],pointRadius:0,yAxisID:'y2',order:0});
  const yMax=Math.ceil(Math.max(...MEMBERS.map(n=>S.stats.target[n]||0),...cumul)*1.15/5)*5;
  CHARTS.cumul=new Chart(document.getElementById('cumulChart'),{type:'bar',data:{labels:MEMBERS,datasets:ds},

function buildHeatAnnual(m){
  const year=m.slice(0,4),isCur=year===String(NOW.getFullYear());
  const endDate=isCur?TODAY:`${year}-12-31`, start=new Date(year,0,1);
  const dayMap={}; for(const e of S.raw){if(e.date<`${year}-01-01`||e.date>endDate)continue;dayMap[e.date]=Object.keys(e.data).length;}
  const startDow=start.getDay();
  const totalDays=isCur?Math.floor((NOW-start)/86400000)+1:(new Date(year,11,31)-start)/86400000+1;
  const max=Math.max(...Object.values(dayMap),1);
  const cs=13,gap=3,weeks=Math.ceil((startDow+Math.ceil(totalDays))/7);
  let cols=Array.from({length:weeks},()=>[]),di=0;
  for(let cell=0;cell<weeks*7;cell++){const w=Math.floor(cell/7);
    if(cell<startDow||di>=totalDays){cols[w].push(null);continue;}
    const date=new Date(start.getTime()+di*86400000);
    const ds=`${year}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    const cnt=dayMap[ds]||0,lv=cnt===0?0:cnt<=max*.33?1:cnt<=max*.66?2:3;cols[w].push({ds,cnt,lv});di++;}
  const monthLabels=Array(weeks).fill('');let lm=-1;
  for(let w=0;w<weeks;w++){const fc=cols[w].find(c=>c);if(fc){const mo=parseInt(fc.ds.slice(5,7));if(mo!==lm){monthLabels[w]=mo+'월';lm=mo;}}}
  let html=`<div style="display:flex;gap:0"><div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:4px;margin-top:18px">`;
  DOW_KR.forEach(d=>html+=`<div style="height:${cs}px;line-height:${cs}px;font-size:9px;color:var(--muted);text-align:right">${d}</div>`);
  html+=`</div><div><div style="display:flex;gap:${gap}px;margin-bottom:3px">`;
  for(let w=0;w<weeks;w++)html+=`<div style="width:${cs}px;font-size:9px;color:var(--muted);white-space:nowrap;overflow:visible">${monthLabels[w]}</div>`;
  html+=`</div>`;
  for(let d=0;d<7;d++){html+=`<div style="display:flex;gap:${gap}px;margin-bottom:${gap}px">`;
    for(let w=0;w<weeks;w++){const c=cols[w][d];if(!c){html+=`<div style="width:${cs}px;height:${cs}px;opacity:0"></div>`;continue;}
      html+=`<div class="hm-cell ${c.lv>0?'lv'+c.lv:''}" style="width:${cs}px;height:${cs}px" title="${c.ds}: ${c.cnt}명"></div>`;}
    html+=`</div>`;}
  html+=`</div></div><div class="hm-legend">적음 <div class="hm-cell"></div><div class="hm-cell lv1"></div><div class="hm-cell lv2"></div><div class="hm-cell lv3"></div> 많음</div>`;
  document.getElementById('heatAnnual').innerHTML=html;
}

function buildHeatCumul(){

  const max=Math.max(...MEMBERS.map(n=>Math.max(...months.map(mo=>S.monthly[mo]?.[n]||0))),1);
  const rows=MEMBERS.map(name=>{
    const cells=months.map(mo=>{const c=S.monthly[mo]?.[name]||0;const lv=c===0?'':c<=max*.33?'lv1':c<=max*.66?'lv2':'lv3';
      return `<div class="hm-cell ${lv}" style="width:13px;height:13px" title="${name} ${mo}: ${c}일"></div>`;}).join('');
    return `<div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
      <span style="font-size:10px;color:var(--muted);min-width:30px;font-family:'DM Mono',monospace;text-align:right">${name}</span>
      <div style="display:flex;gap:2px">${cells}</div></div>`;}).join('');
  const labels=months.map((mo,i)=>{const prev=months[i-1];
    return (!prev||prev.slice(0,4)!==mo.slice(0,4))?`<span style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;display:inline-block;min-width:15px">${mo.slice(2,4)}년</span>`:`<span style="display:inline-block;min-width:15px"></span>`;}).join('');
  document.getElementById('heatCumul').innerHTML=`<div style="overflow-x:auto"><div style="margin-left:33px;display:flex;gap:2px;margin-bottom:4px">${labels}</div><div>${rows}</div></div>
    <div class="hm-legend">적음 <div class="hm-cell"></div><div class="hm-cell lv1"></div><div class="hm-cell lv2"></div><div class="hm-cell lv3"></div> 많음</div>`;
}

/* =================================================================
   페이지 4: VS 라이벌 비교 (신규)
   두 멤버를 골라 6개 지표 H2H + 레이더 + 월별 듀얼 + 요일 패턴 비교
   ================================================================= */
function vsMetrics(name){
  const md=S.monthly[S.selMonth]||{};
  const year=S.selMonth.slice(0,4);
  const cumulYear=Object.keys(S.monthly).filter(ym=>ym.startsWith(year)).reduce((s,ym)=>s+(S.monthly[ym]?.[name]||0),0);
  const target=S.stats.target[name]||0;
  const st=streakInfo(name);
  const sports=new Set();
  for(const e of S.raw)if(e.data[name])for(const s of e.data[name]){const k=normSport(s);if(k)sports.add(k);}
  return {
    month:md[name]||0,
    year:cumulYear,
    rate:target?cumulYear/target*100:0,
    cur:st.current,
    longest:st.longest,
    sports:sports.size,
  };
}
function setVs(side,name){
  if(side==='A'){ if(name===S.vsB) S.vsB=S.vsA; S.vsA=name; }
  else { if(name===S.vsA) S.vsA=S.vsB; S.vsB=name; }
  ['vsRadar','vsDuel','vsWeekday'].forEach(k=>{if(CHARTS[k]){try{CHARTS[k].destroy();}catch(e){}delete CHARTS[k];}});
  renderVS();
}
function renderVS(){
  const a=S.vsA||MEMBERS[0], b=S.vsB||MEMBERS[1];
  const A=vsMetrics(a), B=vsMetrics(b);
  const rows=[
    {k:'month',  l:`이달 운동 (${S.selMonth.slice(5)}월)`, u:'일'},
    {k:'year',   l:'올해 누적', u:'일'},
    {k:'rate',   l:'목표 달성률', u:'%', dec:1},
    {k:'cur',    l:'현재 스트릭', u:'일'},
    {k:'longest',l:'최장 스트릭', u:'일'},
    {k:'sports', l:'종목 다양성', u:'종목'},
  ];
  let winA=0,winB=0;
  rows.forEach(r=>{if(A[r.k]>B[r.k])winA++;else if(B[r.k]>A[r.k])winB++;});
  const verdict = winA===winB ? `팽팽한 접전 — <b>${winA} : ${winB}</b> 무승부`
    : winA>winB ? `이번 라운드는 <b>${a}</b> 우세 (${winA} : ${winB})`
    : `이번 라운드는 <b>${b}</b> 우세 (${winB} : ${winA})`;

  const picker=(side,cur,other)=>`
    <select class="select" style="width:100%;max-width:170px;text-align:center" onchange="setVs('${side}',this.value)">

    return `<div class="h2h-row">

      <div class="h2h-bar l"><div class="h2h-fill" style="width:${fa}%;background:${avatarColor(a)}"></div></div>

      <div class="h2h-bar"><div class="h2h-fill" style="width:${fb}%;background:${avatarColor(b)}"></div></div>
      <span class="h2h-val r ${bw?'win':''}">${fmt(vb)}</span>

    <div class="sec-desc">두 멤버를 골라 이달·올해·스트릭·다양성을 정면 비교해보세요. 친선 경기니까, 진 쪽이 커피 사기? ☕</div>

          <div class="nm">${winB>winA?'👑 ':''}${b}</div>
          ${picker('B',b,a)}
        </div>
      </div>
      <div class="vs-verdict">${verdict}</div>
      <div class="h2h">${h2h}</div>

        <div class="chart-box h300"><canvas id="vsDuel"></canvas></div>

function buildVsRadar(a,b,A,B){
  const f=chartFont();
  // 그룹 최대치 기준 정규화 (0~100)
  const all=MEMBERS.map(vsMetrics);
  const axes=[
    {k:'month',l:'이달'},{k:'year',l:'올해 누적'},{k:'rate',l:'달성률'},
    {k:'longest',l:'최장 스트릭'},{k:'sports',l:'종목 다양성'},
  ];
  const maxOf=k=>Math.max(...all.map(m=>m[k]),1);
  const norm=M=>axes.map(ax=>Math.round(M[ax.k]/maxOf(ax.k)*100));
  const toRGBA=(name,alpha)=>{
    const idx=MEMBERS.indexOf(name); // hsl → hsla 문자열
    return `hsla(${idx*30},62%,56%,${alpha})`;
  };
  CHARTS.vsRadar=new Chart(document.getElementById('vsRadar'),{type:'radar',
    data:{labels:axes.map(ax=>ax.l),datasets:[
      {label:a,data:norm(A),borderColor:avatarColor(a),backgroundColor:toRGBA(a,.18),borderWidth:2,pointRadius:3,pointBackgroundColor:avatarColor(a)},
      {label:b,data:norm(B),borderColor:avatarColor(b),backgroundColor:toRGBA(b,.18),borderWidth:2,pointRadius:3,pointBackgroundColor:avatarColor(b)},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:f.text,font:{size:12,weight:'700'},boxWidth:12}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}점`}}},
      scales:{r:{min:0,max:100,ticks:{display:false,stepSize:25},
        grid:{color:f.grid},angleLines:{color:f.grid},
        pointLabels:{color:f.text,font:{size:11,weight:'700'}}}}}});
}

function buildVsDuel(a,b){
  const f=chartFont();
  const year=S.selMonth.slice(0,4);
  const isCur=year===String(NOW.getFullYear());
  const maxMo=isCur?parseInt(nowYM.slice(5,7)):12;
  const labels=[],da=[],db=[];
  for(let mo=1;mo<=maxMo;mo++){
    const ym=`${year}-${String(mo).padStart(2,'0')}`;
    labels.push(mo+'월');
    da.push(S.monthly[ym]?.[a]||0);
    db.push(S.monthly[ym]?.[b]||0);
  }
  CHARTS.vsDuel=new Chart(document.getElementById('vsDuel'),{type:'line',
    data:{labels,datasets:[
      {label:a,data:da,borderColor:avatarColor(a),backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,pointBackgroundColor:avatarColor(a),tension:.3},
      {label:b,data:db,borderColor:avatarColor(b),backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,pointBackgroundColor:avatarColor(b),tension:.3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:f.text,font:{size:12,weight:'700'},boxWidth:12}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}일`}}},
      scales:{x:{ticks:{color:f.text,font:{size:11}},grid:{display:false}},
        y:{ticks:{color:f.muted,font:{size:10}},grid:{color:f.grid},beginAtZero:true}}}});
}

function buildVsWeekday(a,b){
  const f=chartFont();
  const cnt=name=>{
    const arr=[0,0,0,0,0,0,0];
    for(const e of S.raw)if(e.data[name])arr[new Date(e.date).getDay()]++;
    return arr;
  };
  CHARTS.vsWeekday=new Chart(document.getElementById('vsWeekday'),{type:'bar',
    data:{labels:DOW_KR,datasets:[
      {label:a,data:cnt(a),backgroundColor:avatarColor(a),borderRadius:5},
      {label:b,data:cnt(b),backgroundColor:avatarColor(b),borderRadius:5},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:f.text,font:{size:12,weight:'700'},boxWidth:12}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw}회`}}},
      scales:{x:{ticks:{color:f.text,font:{size:12,weight:'700'}},grid:{display:false}},
        y:{ticks:{color:f.muted,font:{size:10}},grid:{color:f.grid},beginAtZero:true}}}});
}

  const target=S.stats.target[name]||0;
  const rate=target?(cumulYear/target*100):0;
  const totalAll=dates.length;
  const lv=levelInfo(totalAll);
  const proj=(year===String(NOW.getFullYear()))?projectYearEnd(cumulYear):null;

  // 종목 구성
  const sportCount={};
  for(const e of S.raw)if(e.data[name])for(const s of e.data[name]){const k=normSport(s);if(!k)continue;sportCount[k]=(sportCount[k]||0)+1;}

  // 배지
  const achvs=[

      ${buildPaceNudge(paceG, nx, target)}
      ${(S.legacy.perMember[name]||0) ? `<div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:center">
        📎 이전 기록(24년 이전) <b style="color:var(--text2)">${S.legacy.perMember[name]}회</b> — 지금 지표는 모두 <b style="color:var(--text2)">25.01~</b> 기준이에요</div>` : ''}

// 개인 프로필 — 다음 색 등급까지 안내 카드
function buildPaceNudge(paceG, nx, target){
  if(!target){
    return `<div class="pace-nudge keep"><span class="pn-emoji">🎯</span>
      <span class="pn-text">아직 목표가 설정되지 않았어요. 목표를 정하면 페이스 안내를 볼 수 있어요.</span></div>`;
  }
  if(!nx || paceG.level==='green'){
    return `<div class="pace-nudge keep"><span class="pn-emoji">🟢</span>
      <span class="pn-text"><b>초록불</b> — 목표 페이스를 유지하고 있어요! 이대로만 꾸준히 💪</span></div>`;
  }
  const curColor = paceG.level==='amber' ? '노란불' : '빨간불';
  const curEmoji = paceG.level==='amber' ? '🟡' : '🔴';
  const nextColor = nx.toColor==='green' ? '초록불' : '노란불';
  const nextVar   = nx.toColor==='green' ? 'var(--green)' : 'var(--amber)';
  const nextEmoji = nx.toColor==='green' ? '🟢' : '🟡';
  const cls = nx.toColor==='green' ? 'to-green' : 'to-amber';
  if(nx.unreachable){
    return `<div class="pace-nudge to-amber"><span class="pn-emoji">${curEmoji}</span>
      <span class="pn-text">지금은 <b>${curColor}</b>이에요. 아쉽지만 올해 남은 <b>${nx.daysLeft}일</b> 동안 매일 운동해도
      ${nextColor} 도달은 어려워요. 그래도 오늘 한 번이 내년의 나를 만듭니다 💪</span></div>`;
  }
  return `<div class="pace-nudge ${cls}"><span class="pn-emoji">${curEmoji}</span>
    <span class="pn-text">지금은 <b>${curColor}</b>이에요. 오늘부터 <b>매일 운동하면 ${nx.need}일째</b>에
    <b style="color:${nextVar}">${nextColor}</b>로 바뀌어요 ${nextEmoji}
    <span style="color:var(--muted);font-size:11px">(하루 1회 · 색 기준이 매일 조금씩 오르는 것까지 반영)</span></span></div>`;
}

function profCalMove(delta){
  const [y,m]=profCalYM.split('-').map(Number);
  const d=new Date(y,m-1+delta,1);
  const cand=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if(cand>nowYM) return; // 미래는 막음
  profCalYM=cand;
  renderProfileCal(S.selMember);
}
function renderProfileCal(name){
  const ym=profCalYM, [y,mo]=ym.split('-').map(Number);
  document.getElementById('profCalLabel').textContent=`${y}년 ${mo}월`;
  const dayMap={};
  for(const e of S.raw){if(!e.date.startsWith(ym)||!e.data[name])continue;
    dayMap[e.date]=e.data[name].map(normSport).filter(Boolean);}
  const days=new Date(y,mo,0).getDate();
  const first=new Date(y,mo-1,1).getDay();
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const key=`${ym}-${String(d).padStart(2,'0')}`;
    const sports=dayMap[key];
    const isToday=key===TODAY;
    const dow=(first+d-1)%7;
    const dcol=dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text2)';
    if(sports&&sports.length){
      const emos=[...new Set(sports.map(sportEmoji))].slice(0,3).join('');
      const title=sports.join(', ');
      cells+=`<div class="cal-cell on${isToday?' today':''}" title="${key} · ${title}">
        <span class="cd" style="color:${dcol}">${d}</span><span class="ce">${emos}</span></div>`;
    }else{
      cells+=`<div class="cal-cell${isToday?' today':''}"><span class="cd" style="color:${dcol}">${d}</span></div>`;
    }
  }
  const cnt=Object.keys(dayMap).length;
  document.getElementById('profileCal').innerHTML=`
    <div class="cal-dow">${DOW_KR.map((d,i)=>`<span style="color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--muted)'}">${d}</span>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px">이 달 <b style="color:var(--accent)">${cnt}일</b> 운동 💪</div>`;
}

function buildProfileHeat(name){
  const year=S.selMonth.slice(0,4),isCur=year===String(NOW.getFullYear());
  const endDate=isCur?TODAY:`${year}-12-31`,start=new Date(year,0,1);
  const set=new Set([...activeDates(name)].filter(d=>d.startsWith(year)));
  const startDow=start.getDay();
  const totalDays=isCur?Math.floor((NOW-start)/86400000)+1:(new Date(year,11,31)-start)/86400000+1;
  const cs=13,gap=3,weeks=Math.ceil((startDow+Math.ceil(totalDays))/7);
  let cols=Array.from({length:weeks},()=>[]),di=0;
  for(let cell=0;cell<weeks*7;cell++){const w=Math.floor(cell/7);
    if(cell<startDow||di>=totalDays){cols[w].push(null);continue;}
    const date=new Date(start.getTime()+di*86400000);
    const ds=`${year}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    cols[w].push({ds,on:set.has(ds)});di++;}
  const monthLabels=Array(weeks).fill('');let lm=-1;
  for(let w=0;w<weeks;w++){const fc=cols[w].find(c=>c);if(fc){const mo=parseInt(fc.ds.slice(5,7));if(mo!==lm){monthLabels[w]=mo+'월';lm=mo;}}}
  let html=`<div style="display:flex;gap:0"><div style="display:flex;flex-direction:column;gap:${gap}px;margin-right:4px;margin-top:18px">`;
  DOW_KR.forEach(d=>html+=`<div style="height:${cs}px;line-height:${cs}px;font-size:9px;color:var(--muted);text-align:right">${d}</div>`);
  html+=`</div><div><div style="display:flex;gap:${gap}px;margin-bottom:3px">`;
  for(let w=0;w<weeks;w++)html+=`<div style="width:${cs}px;font-size:9px;color:var(--muted);white-space:nowrap;overflow:visible">${monthLabels[w]}</div>`;
  html+=`</div>`;
  for(let d=0;d<7;d++){html+=`<div style="display:flex;gap:${gap}px;margin-bottom:${gap}px">`;
    for(let w=0;w<weeks;w++){const c=cols[w][d];if(!c){html+=`<div style="width:${cs}px;height:${cs}px;opacity:0"></div>`;continue;}
      html+=`<div class="hm-cell ${c.on?'lv3':''}" style="width:${cs}px;height:${cs}px" title="${c.ds}: ${c.on?'운동 ✓':'휴식'}"></div>`;}
    html+=`</div>`;}
  html+=`</div></div><div class="hm-legend"><div class="hm-cell"></div> 휴식 <div class="hm-cell lv3"></div> 운동</div>`;
  document.getElementById('profileHeat').innerHTML=html;
}

const REDUCED_MOTION = (typeof matchMedia==='function') && matchMedia('(prefers-reduced-motion: reduce)').matches;

// data-count 속성을 가진 요소를 0→목표값으로 애니메이션
function runCountUps(root){
  const els=(root||document).querySelectorAll('[data-count]');
  els.forEach(el=>{
    const target=parseFloat(el.dataset.count)||0;
    const dec=parseInt(el.dataset.dec||'0');
    if(REDUCED_MOTION){el.textContent=target.toFixed(dec);return;}
    const dur=800;
    const t0=performance.now();
    function tick(t){
      const p=Math.min(1,(t-t0)/dur);
      const eased=1-Math.pow(1-p,3); // ease-out cubic
      el.textContent=(target*eased).toFixed(dec);
      if(p<1) requestAnimationFrame(tick);
      else el.textContent=target.toFixed(dec);
    }
    requestAnimationFrame(tick);
  });
}

// 전원 달성 콘페티 — 외부 라이브러리 없이 순수 canvas
function fireConfetti(){
  if(REDUCED_MOTION) return;
  try{
    const cv=document.createElement('canvas');
    cv.id='confettiCanvas';
    document.body.appendChild(cv);
    const ctx=cv.getContext('2d');
    if(!ctx){cv.remove();return;}
    const W=cv.width=innerWidth, H=cv.height=innerHeight;
    const colors=[...MEM_COLORS,'#ffd23f','#ff6b3d'];
    const parts=Array.from({length:140},()=>({
      x:Math.random()*W, y:-20-Math.random()*H*0.4,
      w:6+Math.random()*6, h:8+Math.random()*8,
      vy:2.2+Math.random()*3.2, vx:(Math.random()-0.5)*2.2,
      rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.25,
      c:colors[Math.floor(Math.random()*colors.length)],
    }));
    const t0=performance.now();
    (function frame(t){
      const el=(t-t0)/1000;
      ctx.clearRect(0,0,W,H);
      for(const p of parts){
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-el/2.4);
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
      if(el<2.6) requestAnimationFrame(frame);
      else cv.remove();
    })(t0);
  }catch(e){ /* canvas 미지원 환경 무시 */ }
}

function openCmdk(){
  const ov=document.getElementById('cmdkOverlay');
  ov.classList.add('open');
  const inp=document.getElementById('cmdkInput');
  inp.value=''; cmdkFilter(); inp.focus();
}
function closeCmdk(){document.getElementById('cmdkOverlay').classList.remove('open');}
function cmdkFilter(){
  const q=document.getElementById('cmdkInput').value.trim().toLowerCase();
  const all=cmdkActions();
  cmdkItems = q ? all.filter(a=>(a.label+(a.kw||'')+(a.g||'')).toLowerCase().includes(q)) : all;
  cmdkIdx=0;
  renderCmdkList();
}
function renderCmdkList(){
  const list=document.getElementById('cmdkList');
  if(!cmdkItems.length){list.innerHTML=`<div class="cmdk-empty">검색 결과가 없어요</div>`;return;}
  let html='',lastG=null;
  cmdkItems.forEach((a,i)=>{
    if(a.g!==lastG){html+=`<div class="cmdk-group">${a.g}</div>`;lastG=a.g;}
    html+=`<div class="cmdk-item ${i===cmdkIdx?'active':''}" data-i="${i}"
      onclick="cmdkRun(${i})" onmousemove="cmdkIdx=${i};renderCmdkList()">
      <span class="e">${a.e}</span>${a.label}</div>`;
  });
  list.innerHTML=html;
  const act=list.querySelector('.cmdk-item.active');
  if(act&&typeof act.scrollIntoView==='function') act.scrollIntoView({block:'nearest'});
}
function cmdkRun(i){
  const a=cmdkItems[i];
  if(!a)return;
  closeCmdk();
  a.run();
}
function cmdkKey(ev){
  if(ev.key==='ArrowDown'){ev.preventDefault();cmdkIdx=Math.min(cmdkItems.length-1,cmdkIdx+1);renderCmdkList();}
  else if(ev.key==='ArrowUp'){ev.preventDefault();cmdkIdx=Math.max(0,cmdkIdx-1);renderCmdkList();}
  else if(ev.key==='Enter'){ev.preventDefault();cmdkRun(cmdkIdx);}
  else if(ev.key==='Escape'){closeCmdk();}
}
document.addEventListener('keydown',ev=>{
  const isK=(ev.key==='k'||ev.key==='K')&&(ev.metaKey||ev.ctrlKey);
  const isSlash=ev.key==='/'&&!/INPUT|TEXTAREA|SELECT/.test(document.activeElement?.tagName||'');
  if(isK||isSlash){ev.preventDefault();openCmdk();}
  else if(ev.key==='Escape'){
    if(document.getElementById('cmdkOverlay').classList.contains('open'))closeCmdk();
    if(document.getElementById('lvlOverlay').classList.contains('open'))closeLevelGuide();
    if(document.getElementById('ibOverlay').classList.contains('open'))closeIbModal();
  }
});

/* =================================================================
   개인 탭 — 인스타 스토리용 9:16 카드 이미지 생성 & 다운로드
   외부 라이브러리 없이 순수 canvas로 1080×1920 렌더링.
   멤버 색(HSL) 기반 그라데이션 배경.
   ================================================================= */
function memberHSL(name){
  const idx=MEMBERS.indexOf(name);
  const h=idx>=0?idx*30:210;
  return {h, s:62, l:56};
}
function roundRect(ctx,x,y,w,h,r){
  if(w<2*r)r=w/2; if(h<2*r)r=h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

  try{
    const W=1080, H=1920;
    const cv=document.createElement('canvas');
    cv.width=W; cv.height=H;
    const c=cv.getContext('2d');

    // ---- 배경: 멤버 색 기반 대각 그라데이션 ----
    const g=c.createLinearGradient(0,0,W,H);
    g.addColorStop(0, `hsl(${h}, 58%, 20%)`);

    glow.addColorStop(1, 'hsla(0,0%,0%,0)');

      c.beginPath();
      c.moveTo(donutCX,donutCY);
      c.arc(donutCX,donutCY,donutR,ang,ang+slice);
      c.closePath();
      c.fillStyle=donutColors[i]; c.fill();
      ang+=slice;
    });
    c.beginPath(); c.arc(donutCX,donutCY,donutInner,0,Math.PI*2);
    c.fillStyle=`hsl(${(h+18)%360}, 40%, 11%)`; c.fill();
    c.textAlign='center'; c.textBaseline='middle';
    c.font='800 30px "Archivo", "DM Mono", monospace'; c.fillStyle=white;
    c.fillText(String(D.sportTop.length), donutCX, donutCY-8);
    c.font='500 18px "Noto Sans KR", sans-serif'; c.fillStyle=dim;
    c.fillText('종목', donutCX, donutCY+20);
    c.textBaseline='alphabetic';

    // 범례
    c.textAlign='left';
    const legX=donutCX+180, legY0=y+40;
    D.sportTop.forEach(([sp,v],i)=>{
      const ly=legY0+i*46;
      roundRect(c,legX,ly-20,26,26,7); c.fillStyle=donutColors[i]; c.fill();
      c.font='700 30px "Noto Sans KR", sans-serif'; c.fillStyle=white;
      c.fillText(sp, legX+42, ly);
      c.font='500 28px "DM Mono", monospace'; c.fillStyle=dim;
      c.textAlign='right';
      c.fillText(`${v}회 · ${Math.round(v/total*100)}%`, W-PAD, ly);
      c.textAlign='left';
    });

    // ---- 페이스 신호등 배너 ----
    y=1740;
    const paceMap={
      green:{txt:'초록불 · 목표 페이스 유지 중', col:`hsl(145,60%,55%)`},
      amber:{txt:'노란불 · 조금만 더 힘내요', col:`hsl(42,90%,58%)`},
      red:{txt:'빨간불 · 다시 리듬 찾는 중', col:`hsl(350,75%,62%)`},
    };
    let paceTxt=(paceMap[D.paceLevel]||paceMap.green).txt;
    let paceCol=(paceMap[D.paceLevel]||paceMap.green).col;
    if(D.nx && !D.nx.unreachable){
      const to=D.nx.toColor==='green'?'초록불':'노란불';
      paceTxt += `  →  매일 하면 ${D.nx.need}일 뒤 ${to}`;
    }else if(D.nx && D.nx.unreachable){
      paceTxt += `  →  올해 도달은 어려워요`;
    }
    c.save();
    roundRect(c,PAD,y,W-PAD*2,90,24);
    c.fillStyle='rgba(255,255,255,0.08)'; c.fill();
    c.restore();
    c.beginPath(); c.arc(PAD+46,y+45,16,0,Math.PI*2); c.fillStyle=paceCol; c.fill();
    c.textAlign='left'; c.textBaseline='middle';
    c.font='700 30px "Noto Sans KR", sans-serif'; c.fillStyle=white;
    c.fillText(paceTxt, PAD+82, y+47);
    c.textBaseline='alphabetic';

    // ---- 푸터 ----
    c.textAlign='center';
    c.font='500 26px "Noto Sans KR", sans-serif'; c.fillStyle=dim2;
    const dateStr=`${NOW.getFullYear()}.${String(NOW.getMonth()+1).padStart(2,'0')}.${String(NOW.getDate()).padStart(2,'0')} 기준`;
    c.fillText(`#오운완  ·  ${dateStr}`, W/2, 1880);

    // ---- 다운로드 ----
    await new Promise(res=>{
      if(typeof URL==='undefined'||typeof URL.createObjectURL!=='function'){res();return;}
      cv.toBlob(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download=`오운완_${D.name}_${D.year}.png`;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
        res();
      }, 'image/png');
    });
  }catch(e){
    alert('이미지 생성 중 문제가 발생했어요: '+e.message);
  }finally{
    if(btn){ btn.disabled=false; btn.innerHTML='<span style="font-size:15px">📸</span> 스토리 이미지 저장'; }
  }
}
// 폰트 지정 후 텍스트 폭 측정 헬퍼 (원래 폰트 복원)
function measureW(c, text, font){
  const prev=c.font; c.font=font;
  const w=c.measureText(text).width; c.font=prev;
  return w;
}

/* =================================================================
   인바디 — 개인 기록 탭 섹션 + 입력 모달 (PIN 서버 검증)
   ================================================================= */
const IB_METRICS=[
  {k:'weight',l:'몸무게',u:'kg',dec:1,goodDown:true},
  {k:'smm',l:'골격근량',u:'kg',dec:1,goodDown:false},
  {k:'bfm',l:'체지방량',u:'kg',dec:1,goodDown:true},
  {k:'pbf',l:'체지방률',u:'%',dec:1,goodDown:true,derived:true},
  {k:'bmi',l:'BMI',u:'',dec:1,goodDown:true,derived:true},
  {k:'whr',l:'복부지방률',u:'',dec:2,goodDown:true},
  {k:'vfl',l:'내장지방',u:'Lv',dec:0,goodDown:true},
];
function ibDerive(r,height){
  const o={...r};
  o.pbf=(r.weight&&r.bfm!=null)?r.bfm/r.weight*100:null;
  o.bmi=(r.weight&&height)?r.weight/Math.pow(height/100,2):null;
  return o;
}
function ibRecordsOf(name){
  return S.inbody.records.filter(r=>r.name===name)
    .sort((a,b)=>a.date.localeCompare(b.date)||a.ts-b.ts);
}
function ibChgChip(cur,prev,m){
  if(cur==null||prev==null)return '<span class="chg eq">—</span>';
  const d=cur-prev;
  if(Math.abs(d)<Math.pow(10,-m.dec)/2)return '<span class="chg eq">변화없음</span>';
  const good=m.goodDown?d<0:d>0;
  const arrow=d>0?'▲':'▼';
  return `<span class="chg ${good?'good':'bad'}">${arrow}${Math.abs(d).toFixed(m.dec)}</span>`;
}

function buildInbody(name){
  const el=document.getElementById('inbodyCard');
  if(!el)return;
  const head=(sub)=>`<div class="card-head"><div class="card-title"><span class="dot" style="background:var(--pink)"></span>💉 인바디 기록</div><span class="card-sub">${sub}</span></div>`;

  if(!S.inbody.loaded){
    el.innerHTML=head('연결 대기')+`<div class="empty-hint" style="padding:18px"><span class="ic">🔌</span>
      인바디 API가 아직 연결되지 않았어요.<br>
      <span style="font-size:11px;color:var(--muted)">Apps Script에 인바디 코드를 추가하고 <b>새 버전으로 재배포</b>하면 이 자리에 나타납니다.</span></div>`;
    return;
  }

  const height=S.inbody.members[name]?.height||null;
  const recs=ibRecordsOf(name).map(r=>ibDerive(r,height));

  if(!recs.length){
    el.innerHTML=head('아직 기록 없음')+`
      <div class="empty-hint" style="padding:20px"><span class="ic">💉</span>
        첫 인바디를 기록하면 체중·골격근·체지방 추이를 볼 수 있어요</div>
      <div style="text-align:center;margin-top:6px">
        <button class="ib-btn" onclick="openIbForm('${name}')">＋ 첫 인바디 입력</button>
      </div>`;
    return;
  }

  const latest=recs[recs.length-1], prev=recs.length>1?recs[recs.length-2]:null;
  const stats=IB_METRICS.map(m=>{
    const v=latest[m.k];
    if(v==null)return '';
    return `<div class="ib-stat"><div class="l">${m.l}</div>
      <div class="v">${v.toFixed(m.dec)}<small>${m.u}</small></div>
      ${prev?ibChgChip(v,prev[m.k],m):'<span class="chg eq">첫 기록</span>'}</div>`;
  }).join('');

  const history=[...recs].reverse().slice(0,8).map(r=>`
    <tr><td>${r.date.slice(2)}</td>
      <td>${r.weight?.toFixed(1)??'—'}</td><td>${r.smm?.toFixed(1)??'—'}</td>
      <td>${r.bfm?.toFixed(1)??'—'}</td><td>${r.pbf?r.pbf.toFixed(1)+'%':'—'}</td>
      <td>${r.whr?r.whr.toFixed(2):'—'}</td><td>${r.vfl??'—'}</td>
      <td><button class="ib-del" title="이 기록 삭제 (PIN 필요)" onclick="openIbDelete('${name}',${r.ts})">🗑</button></td></tr>`).join('');

  el.innerHTML=head(`최근 측정 ${latest.date} · 총 ${recs.length}회${prev?' · 변화량은 직전 측정 대비':''}`)+`
    <div class="ib-latest">${stats}</div>
    ${recs.length>=2?`<div class="chart-box" style="height:230px;margin-bottom:14px"><canvas id="inbodyTrend"></canvas></div>`:
      `<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">한 번 더 기록하면 추이 그래프가 나타나요 📈</div>`}
    <div style="overflow-x:auto"><table class="ib-table">
      <thead><tr><th>측정일</th><th>몸무게</th><th>골격근</th><th>체지방</th><th>체지방률</th><th>WHR</th><th>내장</th><th></th></tr></thead>
      <tbody>${history}</tbody></table></div>
    <div style="text-align:center;margin-top:14px">
      <button class="ib-btn" onclick="openIbForm('${name}')">＋ 인바디 입력</button>
    </div>`;

  if(recs.length>=2)buildInbodyChart(recs);
}

function buildInbodyChart(recs){
  const f=chartFont();
  const cv=document.getElementById('inbodyTrend');
  if(!cv)return;
  const labels=recs.map(r=>r.date.slice(2));
  const line=(label,key,color,dash)=>({label,data:recs.map(r=>r[key]),borderColor:color,
    backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,pointBackgroundColor:color,
    tension:.3,spanGaps:true,borderDash:dash||[]});
  CHARTS.inbodyTrend=new Chart(cv,{type:'line',
    data:{labels,datasets:[
      line('몸무게','weight',f.text),
      line('골격근량','smm',f.green),
      line('체지방량','bfm',f.amber),
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:f.text,font:{size:11,weight:'700'},boxWidth:11,padding:8}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${Number(c.raw).toFixed(1)}kg`}}},
      scales:{x:{ticks:{color:f.muted,font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false}},
        y:{ticks:{color:f.muted,font:{size:10},callback:v=>v+'kg'},grid:{color:f.grid}}}}});
}

/* ---------- 입력/삭제 모달 ---------- */
let IB={mode:null,name:null,vals:null,ts:null};
function closeIbModal(){document.getElementById('ibOverlay').classList.remove('open');IB={mode:null,name:null,vals:null,ts:null};}
function ibShow(html){document.getElementById('ibModal').innerHTML=html;document.getElementById('ibOverlay').classList.add('open');}
function ibMsg(txt,cls){const m=document.getElementById('ibFormMsg');if(m){m.textContent=txt;m.className='ib-msg '+(cls||'err');}}

function openIbForm(name){
  const isSetup=!S.inbody.members[name]?.hasPin;
  const keepVals=(IB.name===name)?IB.vals:null;  // "← 수정"으로 돌아올 때 입력값 보존
  IB={mode:isSetup?'setup':'add',name,vals:keepVals};
  const setupFields=isSetup?`
    <div style="background:color-mix(in srgb,var(--accent) 8%,var(--surface2));border:1px solid var(--accent);border-radius:11px;padding:11px 13px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6">
      🔑 <b>${name}</b>님의 첫 입력이에요. 본인 확인용 <b>PIN(숫자 4자리)</b>과 BMI 계산용 <b>키</b>를 함께 설정해주세요. 다음부터는 PIN만 입력하면 됩니다.</div>
    <div class="ib-2col">
      <div><label>키 (cm)</label><input id="ibHeight" type="number" step="0.1" placeholder="예: 175.5"></div>
      <div><label>PIN 설정 (숫자 4자리)</label><input id="ibPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"></div>
    </div>
    <label>PIN 확인</label><input id="ibPin2" type="password" inputmode="numeric" maxlength="4" placeholder="한 번 더 입력">`
  :`<label>PIN (숫자 4자리)</label><input id="ibPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">`;

  ibShow(`
    <h3>💉 인바디 입력 <span style="font-size:12px;color:var(--muted);font-weight:500">— ${name}</span></h3>
    <div class="sub">인바디 결과지의 수치를 그대로 입력하세요. 체지방률·BMI는 자동 계산됩니다.</div>
    <div class="ib-form">
      <label>인바디 측정일</label><input id="ibDate" type="date" value="${TODAY}" max="${TODAY}">
      <div class="ib-2col">
        <div><label>몸무게 (kg)</label><input id="ibWeight" type="number" step="0.1" placeholder="예: 72.5"></div>
        <div><label>골격근량 (kg)</label><input id="ibSmm" type="number" step="0.1" placeholder="예: 32.1"></div>
      </div>
      <div class="ib-2col">
        <div><label>체지방량 (kg)</label><input id="ibBfm" type="number" step="0.1" placeholder="예: 14.2"></div>
        <div><label>복부지방률 WHR <span style="font-weight:500">(선택)</span></label><input id="ibWhr" type="number" step="0.01" placeholder="예: 0.85"></div>
      </div>
      <label>내장지방레벨 <span style="font-weight:500">(선택)</span></label><input id="ibVfl" type="number" step="1" placeholder="예: 6">
      ${setupFields}
      <div id="ibFormMsg" class="ib-msg"></div>
      <div class="ib-actions">
        <button class="lvl-close" onclick="closeIbModal()">취소</button>
        <button class="ib-btn" onclick="ibToConfirm()">다음 → 확인</button>
      </div>
    </div>`);
}

// 1단계 → 확인 다이얼로그 (실수 입력 방지)
function ibToConfirm(){
  const g=id=>document.getElementById(id);
  const num=(id,opt)=>{const v=g(id).value.trim();return v===''?(opt?null:NaN):Number(v);};
  const vals={date:g('ibDate').value, weight:num('ibWeight'), smm:num('ibSmm'),
    bfm:num('ibBfm'), whr:num('ibWhr',1), vfl:num('ibVfl',1)};
  if(!vals.date)return ibMsg('측정일을 선택해주세요');
  if(!(vals.weight>20&&vals.weight<250))return ibMsg('몸무게(kg)를 확인해주세요');
  if(!(vals.smm>5&&vals.smm<100))return ibMsg('골격근량(kg)을 확인해주세요');
  if(!(vals.bfm>=0&&vals.bfm<150))return ibMsg('체지방량(kg)을 확인해주세요');
  if(vals.bfm>=vals.weight)return ibMsg('체지방량이 몸무게보다 클 수 없어요');
  if(vals.whr!=null&&!(vals.whr>0.3&&vals.whr<2))return ibMsg('WHR을 확인해주세요 (예: 0.85)');
  if(vals.vfl!=null&&!(vals.vfl>=1&&vals.vfl<=30))return ibMsg('내장지방레벨은 1~30 사이예요');

  let pin=g('ibPin').value.trim(), height=null;
  if(!/^\d{4}$/.test(pin))return ibMsg('PIN은 숫자 4자리로 입력해주세요');
  if(IB.mode==='setup'){
    if(g('ibPin2').value.trim()!==pin)return ibMsg('PIN 확인이 일치하지 않아요');
    height=Number(g('ibHeight').value);
    if(!(height>100&&height<230))return ibMsg('키(cm)를 확인해주세요');
  }
  IB.vals={...vals,pin,height};

  const pbf=(vals.bfm/vals.weight*100).toFixed(1);
  const rows=[
    ['측정일',vals.date],['몸무게',vals.weight.toFixed(1)+' kg'],
    ['골격근량',vals.smm.toFixed(1)+' kg'],['체지방량',vals.bfm.toFixed(1)+' kg'],
    ['체지방률 (자동)',pbf+' %'],
    ...(vals.whr!=null?[['복부지방률',vals.whr.toFixed(2)]]:[]),
    ...(vals.vfl!=null?[['내장지방레벨','Lv.'+vals.vfl]]:[]),
    ...(IB.mode==='setup'?[['키 (최초 등록)',height+' cm']]:[]),
  ].map(([l,v])=>`<div class="row"><span>${l}</span><b>${v}</b></div>`).join('');

  ibShow(`
    <h3>✅ 입력 확인</h3>
    <div class="ib-confirm">
      <div class="who">⚠️ <b style="color:var(--accent)">${IB.name}</b>님의 인바디로 기록합니다. 본인이 맞나요?</div>
      ${rows}
    </div>
    <div id="ibFormMsg" class="ib-msg"></div>
    <div class="ib-actions">
      <button class="lvl-close" onclick="openIbForm('${IB.name}');ibRestore()">← 수정</button>
      <button class="ib-btn" id="ibSaveBtn" onclick="ibSubmit()">맞아요, 저장</button>
    </div>`);
}
// 수정으로 돌아갈 때 입력값 복원
function ibRestore(){
  const v=IB.vals; if(!v)return;
  const set=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
  set('ibDate',v.date);set('ibWeight',v.weight);set('ibSmm',v.smm);set('ibBfm',v.bfm);
  set('ibWhr',v.whr);set('ibVfl',v.vfl);set('ibHeight',v.height);
}

async function ibSubmit(){
  const btn=document.getElementById('ibSaveBtn');
  if(!btn||!IB.vals)return;  // 확인 단계가 아닌데 호출된 경우 방어
  btn.disabled=true;btn.textContent='저장 중…';
  const v=IB.vals;
  const payload=IB.mode==='setup'
    ?{action:'setup',name:IB.name,pin:v.pin,height:v.height,
      record:{date:v.date,weight:v.weight,smm:v.smm,bfm:v.bfm,whr:v.whr??'',vfl:v.vfl??''}}
    :{action:'add',name:IB.name,pin:v.pin,
      record:{date:v.date,weight:v.weight,smm:v.smm,bfm:v.bfm,whr:v.whr??'',vfl:v.vfl??''}};
  try{
    const r=await ibPost(payload);
    if(!r.ok){ibMsg(r.error||'저장 실패');btn.disabled=false;btn.textContent='맞아요, 저장';return;}
    // 로컬 상태 즉시 반영
    if(r.added)S.inbody.records.push(r.added);
    if(IB.mode==='setup')S.inbody.members[IB.name]={height:v.height,hasPin:true};
    ibShow(`<h3>🎉 저장 완료</h3>
      <div class="sub"><b>${IB.name}</b>님의 인바디가 기록됐어요. 꾸준한 측정이 최고의 동기부여!</div>
      <button class="lvl-close" onclick="closeIbModal();renderPage('me')">확인</button>`);
  }catch(e){
    ibMsg('네트워크 오류: '+e.message);btn.disabled=false;btn.textContent='맞아요, 저장';
  }
}

function openIbDelete(name,ts){
  IB={mode:'delete',name,ts};
  const rec=S.inbody.records.find(r=>r.name===name&&r.ts===ts);
  ibShow(`
    <h3>🗑 기록 삭제</h3>
    <div class="sub"><b>${name}</b>님의 <b>${rec?rec.date:''}</b> 기록을 삭제합니다. 본인 PIN을 입력해주세요.</div>
    <div class="ib-form">
      <label>PIN (숫자 4자리)</label><input id="ibPin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
      <div id="ibFormMsg" class="ib-msg"></div>
      <div class="ib-actions">
        <button class="lvl-close" onclick="closeIbModal()">취소</button>
        <button class="ib-btn" id="ibSaveBtn" style="background:linear-gradient(135deg,var(--red),#ff8a7a)" onclick="ibDoDelete()">삭제</button>
      </div>
    </div>`);
}
async function ibDoDelete(){
  const pin=document.getElementById('ibPin').value.trim();
  if(!/^\d{4}$/.test(pin))return ibMsg('PIN은 숫자 4자리예요');
  const btn=document.getElementById('ibSaveBtn');
  btn.disabled=true;btn.textContent='삭제 중…';
  try{
    const r=await ibPost({action:'delete',name:IB.name,pin,ts:IB.ts});
    if(!r.ok){ibMsg(r.error||'삭제 실패');btn.disabled=false;btn.textContent='삭제';return;}
    S.inbody.records=S.inbody.records.filter(x=>!(x.name===IB.name&&x.ts===IB.ts));
    closeIbModal();renderPage('me');
  }catch(e){ibMsg('네트워크 오류: '+e.message);btn.disabled=false;btn.textContent='삭제';}
}

init();
</script>
