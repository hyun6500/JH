<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오운완 — 우리들의 운동 기록</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="brand">
    <div class="mark"><span>💪</span> <span class="o">오운완</span></div>
    <div class="tag">우리들의 운동 기록</div>
  </div>
  <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
  <div class="header-actions">
    <button class="icon-btn search-btn" title="빠른 검색 (Ctrl+K)" onclick="openCmdk()">🔍<span class="kbd-hint">⌘K</span></button>
    <button class="icon-btn" id="themeBtn" title="라이트/다크 전환" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn" id="refreshBtn" title="새로고침" onclick="init()">🔄</button>
  </div>
</header>

<nav class="tabnav" id="tabnav">
  <button class="tab active" data-page="home" onclick="goPage('home')"><span class="ic">🏠</span> 홈</button>
  <button class="tab" data-page="rank" onclick="goPage('rank')"><span class="ic">🏆</span> 랭킹·챌린지</button>
  <button class="tab" data-page="data" onclick="goPage('data')"><span class="ic">📊</span> 데이터·분석</button>
  <button class="tab" data-page="vs"   onclick="goPage('vs')"><span class="ic">⚔️</span> VS 비교</button>
  <button class="tab" data-page="me"   onclick="goPage('me')"><span class="ic">👤</span> 개인 기록</button>
</nav>

<div class="container">
  <div id="app"><div class="loading"><div class="spin"></div><h3 style="font-size:15px;color:var(--text)">데이터 불러오는 중…</h3></div></div>
</div>

<nav class="bottomnav" id="bottomnav">
  <button class="bn-item active" data-page="home" onclick="goPage('home')"><span class="ic">🏠</span><span class="lb">홈</span></button>
  <button class="bn-item" data-page="rank" onclick="goPage('rank')"><span class="ic">🏆</span><span class="lb">랭킹</span></button>
  <button class="bn-item" data-page="data" onclick="goPage('data')"><span class="ic">📊</span><span class="lb">분석</span></button>
  <button class="bn-item" data-page="vs"   onclick="goPage('vs')"><span class="ic">⚔️</span><span class="lb">VS</span></button>
  <button class="bn-item" data-page="me"   onclick="goPage('me')"><span class="ic">👤</span><span class="lb">개인</span></button>
</nav>

<div class="cmdk-overlay" id="cmdkOverlay" onclick="if(event.target===this)closeCmdk()">
  <div class="cmdk">
    <input class="cmdk-input" id="cmdkInput" placeholder="멤버, 탭, 월 검색…" autocomplete="off"
      oninput="cmdkFilter()" onkeydown="cmdkKey(event)">
    <div class="cmdk-list" id="cmdkList"></div>
    <div class="cmdk-foot"><span><kbd>↑↓</kbd> 이동</span><span><kbd>Enter</kbd> 선택</span><span><kbd>Esc</kbd> 닫기</span></div>
  </div>
</div>

<div class="lvl-overlay" id="lvlOverlay" onclick="if(event.target===this)closeLevelGuide()">
  <div class="lvl-modal" id="lvlModal"></div>
</div>

<div class="lvl-overlay" id="ibOverlay" onclick="if(event.target===this)closeIbModal()">
  <div class="lvl-modal" id="ibModal"></div>
</div>

<div class="lvl-overlay" id="storyOverlay" onclick="if(event.target===this)closeStoryPreview()">
  <div class="lvl-modal story-modal" id="storyModal"></div>
</div>


<!-- ===== 앱 스크립트 (로드 순서 중요: core → 페이지들 → 위젯 → 진입점) ===== -->
<script src="js/core.js"></script>
<script src="js/page-home.js"></script>
<script src="js/page-rank.js"></script>
<script src="js/page-data.js"></script>
<script src="js/page-vs.js"></script>
<script src="js/page-me.js"></script>
<script src="js/widgets.js"></script>
<script src="js/storycard.js"></script>
<script src="js/inbody.js"></script>
<script src="js/main.js"></script>
</body>
</html>
