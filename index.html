<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오운완 — 우리들의 운동 기록</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=DM+Mono:wght@400;500&display=swap');

/* ============ THEME TOKENS — "새벽 트랙" ============ */
:root[data-theme="dark"]{
  --bg:#0a0c13; --bg2:#0d1019; --surface:#11141f; --surface2:#171b2a; --surface3:#1f2436;
  --border:#232940; --border2:#303a58;
  --text:#f0f2fb; --text2:#a9b0c8; --muted:#6d7590;
  --accent:#ff6b3d; --accent2:#ffd23f;
  --accent-dim:#b2431f; --accent-glow:rgba(255,107,61,.15); --accent2-glow:rgba(255,210,63,.13);
  --green:#2edd8a; --green-glow:rgba(46,221,138,.13);
  --amber:#ffc233; --red:#ff5d7a;
  --blue:#6c8cff; --purple:#a78bfa; --pink:#f26d9d; --cyan:#35cfe3;
  --gold:#ffd23f; --silver:#9aa6bd; --bronze:#d08a4a;
  --shadow:0 8px 30px rgba(0,0,0,.5); --shadow-sm:0 2px 12px rgba(0,0,0,.32);
  --grid:#1a2032;
  --sunrise:linear-gradient(90deg,#ff6b3d 0%,#ffb13d 55%,#ffd23f 100%);
  --board-bg:radial-gradient(120% 150% at 85% -25%, rgba(255,107,61,.20), transparent 55%),
             radial-gradient(90% 130% at -10% 115%, rgba(108,140,255,.10), transparent 60%),
             linear-gradient(160deg,#131628 0%,#0b0e18 100%);
}
:root[data-theme="light"]{
  --bg:#f7f4ee; --bg2:#f1ede3; --surface:#fffdf9; --surface2:#f4f0e7; --surface3:#ece5d8;
  --border:#e5ded0; --border2:#d3cab6;
  --text:#1c1f2b; --text2:#4b5164; --muted:#8b8f9e;
  --accent:#e8501f; --accent2:#d99106;
  --accent-dim:#f3b9a2; --accent-glow:rgba(232,80,31,.10); --accent2-glow:rgba(217,145,6,.12);
  --green:#0f9d63; --green-glow:rgba(15,157,99,.10);
  --amber:#c98a06; --red:#d93a58;
  --blue:#2f5fd0; --purple:#6d4fd8; --pink:#c62f7f; --cyan:#0b8ba3;
  --gold:#d99106; --silver:#7a8398; --bronze:#b06a2c;
  --shadow:0 10px 34px rgba(60,50,30,.10); --shadow-sm:0 2px 12px rgba(60,50,30,.06);
  --grid:#ece7da;
  --sunrise:linear-gradient(90deg,#e8501f 0%,#ef8e1e 55%,#d99106 100%);
  --board-bg:radial-gradient(120% 150% at 85% -25%, rgba(232,80,31,.13), transparent 55%),
             radial-gradient(90% 130% at -10% 115%, rgba(47,95,208,.07), transparent 60%),
             linear-gradient(160deg,#fffdf7 0%,#f6f1e6 100%);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;transition:background .3s,color .3s;
  background-image:radial-gradient(130% 70% at 50% -12%, var(--accent-glow), transparent 55%);
  background-attachment:fixed;
}
::selection{background:var(--accent-glow);}
.disp{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-weight:400;letter-spacing:.2px;}
.num{font-family:'Archivo','DM Mono',sans-serif;font-weight:800;font-feature-settings:'tnum';letter-spacing:-.5px;}

/* ============ HEADER ============ */
header{
  background:color-mix(in srgb, var(--surface) 84%, transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 22px;height:60px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:300;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand .mark{
  font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:22px;letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;
}
.brand .mark .o{background:var(--sunrise);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand .tag{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.2px;display:none;}
@media(min-width:980px){.brand .tag{display:block;}}

/* ticker */
.ticker-wrap{flex:1;overflow:hidden;min-width:0;
  mask-image:linear-gradient(to right,transparent,#000 7%,#000 93%,transparent);
  -webkit-mask-image:linear-gradient(to right,transparent,#000 7%,#000 93%,transparent);}
.ticker-track{display:flex;white-space:nowrap;animation:tk 24s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes tk{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.tk-item{display:inline-flex;align-items:center;gap:7px;padding:0 18px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);}
.tk-item .d{color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;}
.tk-item .n{color:var(--accent);font-weight:700;}
.tk-item .s{color:var(--text2);}
.tk-item .fire{font-size:11px;}

.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.icon-btn:hover{color:var(--text);border-color:var(--border2);transform:translateY(-1px);}
.icon-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.kbd-hint{display:none;font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-family:'DM Mono',monospace;margin-left:2px;}
@media(min-width:980px){.icon-btn.search-btn{width:auto;padding:0 12px;gap:6px;}.kbd-hint{display:inline-block;}}

/* ============ TAB NAV ============ */
.tabnav{
  position:sticky;top:60px;z-index:280;background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 22px;
  display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
}
.tabnav::-webkit-scrollbar{display:none;}
.tab{
  position:relative;padding:13px 15px;font-size:13.5px;font-weight:700;color:var(--muted);
  background:none;border:none;cursor:pointer;white-space:nowrap;transition:color .15s;
  font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:7px;
}
.tab .ic{font-size:15px;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--text);}
.tab.active::after{
  content:'';position:absolute;left:12px;right:12px;bottom:-1px;height:2.5px;
  background:var(--sunrise);border-radius:3px 3px 0 0;
}

/* ============ BOTTOM NAV (mobile) ============ */
.bottomnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:320;
  background:color-mix(in srgb, var(--surface) 90%, transparent);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  justify-content:space-around;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;padding:6px 2px;border-radius:12px;
  color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:color .15s;
}
.bn-item .ic{font-size:19px;line-height:1;}
.bn-item .lb{font-size:9.5px;font-weight:700;}
.bn-item.active{color:var(--accent);}
@media(max-width:760px){
  .bottomnav{display:flex;}
  .tabnav{display:none;}
  .container{padding-bottom:100px !important;}
}

/* ============ LAYOUT ============ */
.container{max-width:1340px;margin:0 auto;padding:22px 18px 80px;}
.page{display:none;animation:fade .35s ease;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.mb14{margin-bottom:14px;}.mt14{margin-top:14px;}
@media(max-width:920px){.g2,.g3{grid-template-columns:1fr;}}

/* ============ CARD ============ */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;
  box-shadow:var(--shadow-sm);transition:background .3s,border-color .3s;
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;gap:10px;}
.card-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;display:flex;align-items:center;gap:8px;}
.card-title .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.card-sub{font-size:11px;color:var(--muted);font-weight:500;}

/* ============ SECTION TITLE ============ */
.sec-eyebrow{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-family:'Archivo',sans-serif;}
.sec-title{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:26px;letter-spacing:.3px;margin-bottom:3px;}
.sec-desc{font-size:13px;color:var(--text2);margin-bottom:18px;}

.chart-box{position:relative;}
.h180{height:180px;}.h220{height:220px;}.h260{height:260px;}.h300{height:300px;}.h340{height:340px;}

.loading{text-align:center;padding:90px 20px;color:var(--muted);}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg);}}
.err{text-align:center;padding:70px 20px;}
.err .ic{font-size:40px;margin-bottom:10px;}
.err h3{font-size:16px;margin-bottom:8px;}
.err p{font-size:13px;color:var(--muted);line-height:1.7;}

/* ============ 전광판 HERO (홈 시그니처) ============ */
.board{
  position:relative;border:1px solid var(--border);border-radius:24px;
  padding:26px 28px 24px;margin-bottom:14px;overflow:hidden;
  background:var(--board-bg);box-shadow:var(--shadow);
}
.board-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;position:relative;}
.board-date{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.board-live{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:var(--accent);letter-spacing:1px;font-family:'Archivo',sans-serif;}
.board-live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.8);}}
.board-bigwrap{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.board-big{font-family:'Archivo',sans-serif;font-weight:900;font-size:82px;line-height:.95;letter-spacing:-3px;
  background:var(--sunrise);-webkit-background-clip:text;background-clip:text;color:transparent;}
.board-of{font-family:'Archivo',sans-serif;font-weight:700;font-size:26px;color:var(--muted);letter-spacing:-1px;}
.board-label{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:19px;color:var(--text);margin-top:2px;}
.board-label b{color:var(--accent2);}
.board-sub{font-size:12px;color:var(--text2);margin-top:6px;}
/* 12 레인 전구 */
.lanes{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-top:20px;position:relative;}
@media(max-width:640px){.lanes{grid-template-columns:repeat(6,1fr);}}
.lane{
  height:38px;border-radius:9px;background:color-mix(in srgb,var(--surface2) 70%,transparent);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .2s;position:relative;
}
.lane:hover{border-color:var(--border2);}
.lane.on{color:#fff;border-color:transparent;animation:lanePop .45s cubic-bezier(.34,1.56,.64,1) backwards;}
@keyframes lanePop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.lane .lk{position:absolute;bottom:2px;right:5px;font-size:8px;opacity:.75;font-family:'DM Mono',monospace;}
.board-quote{
  max-width:360px;min-width:240px;flex:1;
  padding:14px 16px;background:color-mix(in srgb,var(--surface) 55%,transparent);
  border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;
  backdrop-filter:blur(4px);
}
.board-quote .q{font-size:13.5px;line-height:1.6;color:var(--text);font-weight:500;}
.board-quote .by{font-size:11px;color:var(--muted);margin-top:7px;}
.board-quote .by b{color:var(--text2);font-weight:700;}
.year-ring{display:flex;align-items:center;gap:10px;margin-top:12px;}
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-label .pct{font-size:13px;font-weight:800;font-family:'Archivo',sans-serif;color:var(--accent2);}
.ring-label .txt{font-size:8.5px;color:var(--muted);}

/* ============ 인사이트 카드 ============ */
.ins-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;
  scroll-snap-type:x mandatory;scrollbar-width:thin;}
.ins-row::-webkit-scrollbar{height:5px;}
.ins-row::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.ins-card{
  min-width:225px;max-width:280px;flex-shrink:0;scroll-snap-align:start;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;
  display:flex;gap:11px;align-items:flex-start;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.ins-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ins-c,var(--accent));}
.ins-card .e{font-size:21px;flex-shrink:0;margin-top:1px;}
.ins-card .t{font-size:12.5px;font-weight:800;line-height:1.35;}
.ins-card .t b{color:var(--ins-c,var(--accent));}
.ins-card .s{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45;}
.ins-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'Archivo',sans-serif;margin:2px 0 8px;display:flex;align-items:center;gap:6px;}

/* ============ STAT CARDS ============ */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:760px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;
  position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
}
.stat-card .bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.s-label{font-size:11px;color:var(--muted);letter-spacing:.4px;margin-bottom:7px;font-weight:600;display:flex;align-items:center;gap:5px;}
.s-val{font-size:30px;font-weight:800;font-family:'Archivo',sans-serif;line-height:1;letter-spacing:-1px;}
.s-sub{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* ============ STREAK CARDS ============ */
.streak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;}
.streak-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;
  display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);
}
.streak-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow);}
.streak-card .name-row{display:flex;align-items:center;justify-content:space-between;}
.streak-card .nm{font-weight:800;font-size:15px;}
.streak-card .av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
.streak-flame{display:flex;align-items:baseline;gap:5px;}
.streak-flame .num{font-size:27px;font-weight:800;font-family:'Archivo',sans-serif;line-height:1;letter-spacing:-1px;}
.streak-flame .unit{font-size:11px;color:var(--muted);}
.streak-flame.cold .num{color:var(--muted);}
.streak-meta{font-size:10.5px;color:var(--muted);display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;}
.streak-meta b{color:var(--text2);}
.alert-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--red);color:#fff;}
.alert-chip.safe{background:var(--green);color:#0a2a1a;}
.alert-chip.warn{background:var(--amber);color:#2a2005;}

/* ============ LEADERBOARD ============ */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{font-size:11px;color:var(--muted);text-align:left;padding:7px 8px;border-bottom:1px solid var(--border);font-weight:600;}
.lb-table td{padding:10px 8px;font-size:13.5px;border-bottom:1px solid var(--border);}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tbody tr{cursor:pointer;transition:background .12s;}
.lb-table tbody tr:hover td{background:var(--surface2);}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;font-size:11px;font-weight:800;font-family:'Archivo',sans-serif;}
.r1{background:linear-gradient(135deg,#ffd23f,#f59e0b);color:#3a2800;}
.r2{background:linear-gradient(135deg,#cbd5e1,#94a3b8);color:#1e2530;}
.r3{background:linear-gradient(135deg,#e0a878,#cd7c45);color:#3a1f00;}
.rn{background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-size:10px;}
.av-sm{width:26px;height:26px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;margin-right:8px;vertical-align:middle;}
.pbar-row{display:flex;align-items:center;gap:8px;}
.pbar{flex:1;height:6px;background:var(--surface2);border-radius:4px;overflow:hidden;min-width:50px;}
.pfill{height:100%;border-radius:4px;background:var(--green);transition:width .5s;}
.pfill.mid{background:var(--amber);}.pfill.low{background:var(--red);}
.pct{font-size:12px;font-family:'DM Mono',monospace;font-weight:700;min-width:46px;text-align:right;}
.rate-detail{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.next-chip{font-weight:800;font-family:'DM Mono',monospace;}
.next-chip.to-green{color:var(--green);}
.next-chip.to-amber{color:var(--amber);}
.next-chip.unreachable{color:var(--red);}
.proj-chip{font-weight:700;color:var(--cyan);}
.proj-chip.hit{color:var(--green);}
.delta{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;cursor:help;}
.delta.up{color:var(--green);}.delta.dn{color:var(--red);}.delta.eq{color:var(--muted);}

/* podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:10px 0 4px;}
.pod{display:flex;flex-direction:column;align-items:center;gap:8px;}
.pod .av{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;box-shadow:var(--shadow-sm);}
.pod .nm{font-weight:800;font-size:14px;}
.pod .sc{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.pod .stand{width:78px;border-radius:12px 12px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-weight:800;font-family:'Archivo',sans-serif;font-size:18px;}
.pod-1 .stand{height:74px;background:linear-gradient(180deg,#ffd23f,#e8940a);color:#3a2800;}
.pod-2 .stand{height:56px;background:linear-gradient(180deg,#cbd5e1,#94a3b8);color:#1e2530;}
.pod-3 .stand{height:42px;background:linear-gradient(180deg,#e0a878,#cd7c45);color:#3a1f00;}

/* ============ CHALLENGE ============ */
.chal-card{
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-sm);
}
.chal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.chal-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.chal-period{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.chal-goal-bar{height:30px;background:var(--surface2);border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--border);}
.chal-goal-fill{height:100%;background:var(--sunrise);border-radius:9px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;}
.chal-goal-fill .v{font-size:12px;font-weight:800;color:#2a1405;font-family:'Archivo',sans-serif;white-space:nowrap;}
.chal-goal-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px;}
.chal-list{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.chal-row{display:flex;align-items:center;gap:10px;}
.chal-row .nm{width:40px;font-size:12.5px;font-weight:700;flex-shrink:0;}
.chal-row .track{flex:1;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.chal-row .fill{height:100%;border-radius:5px;}
.chal-row .v{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);min-width:54px;text-align:right;}
.chal-row .medal{font-size:13px;width:18px;}

/* ============ SPORT RANK ============ */
.sport-section{display:flex;flex-direction:column;gap:9px;}
.sr-item{display:flex;align-items:center;gap:9px;font-size:12.5px;}
.sr-rank{font-size:11px;color:var(--muted);min-width:16px;font-family:'DM Mono',monospace;font-weight:700;}
.sr-name{width:58px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.sr-bar{flex:1;height:8px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.sr-fill{height:100%;border-radius:5px;transition:width .5s;}
.sr-right{display:flex;align-items:center;gap:7px;min-width:96px;justify-content:flex-end;}
.sr-cnt{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);}
.master-badge{font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:2px 8px;color:var(--amber);white-space:nowrap;font-weight:600;}

/* ============ HEATMAP ============ */
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);transition:transform .1s;display:inline-block;}
.hm-cell:hover{transform:scale(1.55);z-index:10;position:relative;}
.hm-cell.lv1{background:color-mix(in srgb,var(--accent) 30%,transparent);}
.hm-cell.lv2{background:color-mix(in srgb,var(--accent) 62%,transparent);}
.hm-cell.lv3{background:var(--accent);border-color:var(--accent);}
.hm-legend{display:flex;align-items:center;gap:5px;margin-top:9px;font-size:10px;color:var(--muted);}

/* ============ LOG / FEED ============ */
.feed{display:flex;flex-direction:column;gap:2px;max-height:420px;overflow-y:auto;}
.feed::-webkit-scrollbar{width:4px;}.feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.feed-day{padding:9px 2px 5px;font-size:11px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;position:sticky;top:0;background:var(--surface);z-index:2;}
.feed-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:10px;transition:background .12s;}
.feed-item:hover{background:var(--surface2);}
.feed-item .av{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0;}
.feed-item .nm{font-weight:700;font-size:13px;min-width:38px;}
.feed-item .sp{font-size:12px;color:var(--text2);}
.feed-item .sp .tag{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:1px 7px;font-size:11px;margin-right:4px;}

/* ============ SELECT / TOGGLE ============ */
.select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.select:focus{border-color:var(--accent);}
.select option{background:var(--surface);}
.period-btn{padding:6px 16px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.period-btn:hover{color:var(--text2);}
.period-btn.active{background:var(--accent);color:#fff;}
:root[data-theme="dark"] .period-btn.active{color:#2a1405;}
.dropdown-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.dropdown-label{font-size:13px;color:var(--text2);font-weight:600;}

/* ============ YEAR HIGHLIGHT BANNER ============ */
.hl-banner{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:760px){.hl-banner{grid-template-columns:repeat(2,1fr);}}
.hl-cell{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);
  border-radius:16px;padding:18px 16px;text-align:center;box-shadow:var(--shadow-sm);}
.hl-e{font-size:24px;margin-bottom:8px;}
.hl-v{font-size:24px;font-weight:800;font-family:'Archivo',sans-serif;line-height:1.1;margin-bottom:5px;letter-spacing:-.5px;}
.hl-l{font-size:11px;color:var(--muted);line-height:1.4;}

/* ============ TODAY STATUS ============ */
.status-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.status-label b{color:var(--text);font-family:'Archivo',sans-serif;}
.status-dot{width:7px;height:7px;border-radius:50%;}
.status-chips{display:flex;flex-wrap:wrap;gap:7px;}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px 5px 5px;border-radius:30px;
  border:1px solid var(--border);background:var(--surface2);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;}
.status-chip:hover{transform:translateY(-1px);border-color:var(--border2);}
.status-chip.done{border-color:color-mix(in srgb,var(--green) 40%,transparent);background:var(--green-glow);}
.status-chip.pend{opacity:.7;}
.av-xs{width:21px;height:21px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff;}

/* ============ VS 비교 ============ */
.vs-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:16px;}
.vs-side{display:flex;flex-direction:column;gap:10px;align-items:center;}
.vs-side .big-av{width:76px;height:76px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;color:#fff;box-shadow:var(--shadow);transition:transform .2s;}
.vs-side.winner .big-av{transform:scale(1.06);box-shadow:0 0 0 3px var(--accent2),var(--shadow);}
.vs-side .nm{font-weight:800;font-size:16px;display:flex;align-items:center;gap:6px;}
.vs-mark{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:44px;line-height:1;
  background:var(--sunrise);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;}
.vs-verdict{text-align:center;font-size:13px;color:var(--text2);margin:-4px 0 16px;}
.vs-verdict b{color:var(--accent2);}
.h2h{display:flex;flex-direction:column;gap:11px;}
.h2h-row{display:grid;grid-template-columns:56px 1fr 130px 1fr 56px;align-items:center;gap:8px;}
@media(max-width:640px){.h2h-row{grid-template-columns:44px 1fr 96px 1fr 44px;}}
.h2h-val{font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.5px;}
.h2h-val.l{text-align:right;}.h2h-val.r{text-align:left;}
.h2h-val.win{color:var(--accent2);}
.h2h-label{text-align:center;font-size:11px;color:var(--muted);font-weight:700;}
.h2h-bar{height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;display:flex;}
.h2h-bar.l{justify-content:flex-end;}
.h2h-fill{height:100%;border-radius:5px;transition:width .5s;}

/* ============ CMD-K 팔레트 ============ */
.cmdk-overlay{position:fixed;inset:0;background:rgba(5,7,12,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:500;display:none;align-items:flex-start;justify-content:center;padding:14vh 16px 0;}
.cmdk-overlay.open{display:flex;}
.cmdk{width:100%;max-width:540px;background:var(--surface);border:1px solid var(--border2);border-radius:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.5);overflow:hidden;animation:cmdkIn .18s ease;}
@keyframes cmdkIn{from{opacity:0;transform:translateY(-10px) scale(.98);}to{opacity:1;transform:none;}}
.cmdk-input{width:100%;padding:16px 18px;background:transparent;border:none;outline:none;color:var(--text);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:600;border-bottom:1px solid var(--border);}
.cmdk-input::placeholder{color:var(--muted);}
.cmdk-list{max-height:330px;overflow-y:auto;padding:8px;}
.cmdk-list::-webkit-scrollbar{width:4px;}.cmdk-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.cmdk-group{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.2px;padding:8px 10px 4px;text-transform:uppercase;font-family:'Archivo',sans-serif;}
.cmdk-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--text2);}
.cmdk-item .e{font-size:16px;width:22px;text-align:center;}
.cmdk-item.active,.cmdk-item:hover{background:var(--surface2);color:var(--text);}
.cmdk-item.active{box-shadow:inset 2.5px 0 0 var(--accent);}
.cmdk-empty{padding:26px;text-align:center;color:var(--muted);font-size:13px;}
.cmdk-foot{display:flex;gap:14px;padding:9px 16px;border-top:1px solid var(--border);font-size:10.5px;color:var(--muted);}
.cmdk-foot kbd{font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:4px;padding:0 4px;background:var(--surface2);}

/* ============ MEMBER PICKER / PROFILE ============ */
.member-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.mp-chip{display:flex;align-items:center;gap:7px;padding:7px 13px 7px 8px;border-radius:30px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-weight:700;font-size:13px;}
.mp-chip:hover{border-color:var(--border2);transform:translateY(-1px);}
.mp-chip.active{border-color:var(--accent);background:var(--accent-glow);}
.mp-chip .av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;}

.profile-hero{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:6px;}
.profile-hero .big-av{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:30px;color:#fff;box-shadow:var(--shadow);}
.profile-hero .info h2{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-size:26px;font-weight:400;letter-spacing:.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.profile-hero .info .meta{font-size:13px;color:var(--text2);margin-top:4px;}
.profile-hero .info .meta b{color:var(--accent);}
.lv-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:800;
  padding:4px 11px;border-radius:20px;background:var(--accent2-glow);border:1px solid color-mix(in srgb,var(--accent2) 45%,transparent);color:var(--accent2);letter-spacing:0;}
.xp-wrap{margin-top:14px;}
.xp-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;}
.xp-head b{color:var(--accent2);}
.xp-bar{height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent2),#ffe58a);transition:width .6s;}
.story-btn{margin-left:auto;align-self:flex-start;display:inline-flex;align-items:center;gap:7px;
  padding:10px 16px;border-radius:12px;border:1px solid var(--border2);
  background:linear-gradient(135deg,var(--surface2),var(--surface3));color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
.story-btn:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:var(--shadow);}
.story-btn:active{transform:translateY(0);}
.story-btn:disabled{opacity:.6;cursor:wait;}
@media(max-width:680px){.story-btn{margin-left:0;margin-top:10px;width:100%;justify-content:center;}}
.mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 0;}
@media(max-width:680px){.mini-stats{grid-template-columns:repeat(2,1fr);}}
.mini-stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;text-align:center;}
.mini-stat .v{font-size:23px;font-weight:800;font-family:'Archivo',sans-serif;letter-spacing:-.5px;}
.mini-stat .l{font-size:10.5px;color:var(--muted);margin-top:4px;}

/* 페이스 넛지 */
.pace-nudge{margin-top:14px;padding:13px 15px;border-radius:12px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;font-size:13px;line-height:1.5;}
.pace-nudge .pn-emoji{font-size:22px;flex-shrink:0;}
.pace-nudge .pn-text b{font-family:'DM Mono',monospace;}
.pace-nudge.to-green{background:var(--green-glow);border-color:color-mix(in srgb,var(--green) 35%,transparent);}
.pace-nudge.to-amber{background:color-mix(in srgb,var(--amber) 10%,transparent);border-color:color-mix(in srgb,var(--amber) 35%,transparent);}
.pace-nudge.keep{background:var(--green-glow);border-color:color-mix(in srgb,var(--green) 30%,transparent);}

.empty-hint{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;}
.empty-hint .ic{font-size:34px;margin-bottom:10px;display:block;}

/* badges */
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.achv{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);font-size:12px;}
.achv.on{border-color:color-mix(in srgb,var(--accent2) 55%,transparent);background:var(--accent2-glow);}
.achv.off{opacity:.45;}
.achv .e{font-size:16px;}
.achv .t b{display:block;font-weight:700;font-size:12px;}
.achv .t span{font-size:10px;color:var(--muted);}

.weekday-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.wd-cell{text-align:center;padding:10px 4px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);}
.wd-cell .d{font-size:11px;color:var(--muted);margin-bottom:5px;}
.wd-cell .v{font-size:17px;font-weight:800;font-family:'Archivo',sans-serif;}
.wd-cell.best{border-color:var(--accent);background:var(--accent-glow);}

/* profile calendar */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px;}
.cal-dow span{text-align:center;font-size:10.5px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-cell{aspect-ratio:1;border-radius:9px;border:1px solid var(--border);background:var(--surface2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;min-height:38px;}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell .cd{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;}
.cal-cell .ce{font-size:14px;line-height:1;}
.cal-cell.on{background:var(--accent-glow);border-color:color-mix(in srgb,var(--accent) 45%,transparent);}
.cal-cell.on .cd{color:var(--text)!important;}
.cal-cell.today{box-shadow:0 0 0 2px var(--accent);}

/* 콘페티 캔버스 */
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:600;}

/* 접근성/모션 */
button:focus-visible,.select:focus-visible,.cmdk-input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
  .ticker-track{animation:none;}
  html{scroll-behavior:auto;}
}
/* ---------- 레벨 가이드 모달 ---------- */
.lvl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:210;padding:20px}
.lvl-overlay.open{display:flex;animation:fadeIn .15s ease}
.lvl-modal{width:100%;max-width:430px;max-height:82vh;overflow-y:auto;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 22px 60px rgba(0,0,0,.4)}
.lvl-modal h3{font-family:'Black Han Sans','Noto Sans KR',sans-serif;font-weight:400;font-size:19px;
  color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.lvl-modal .sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.lvl-row{display:flex;align-items:flex-start;gap:12px;padding:11px 12px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface2);margin-bottom:8px;position:relative}
.lvl-row.cur{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--surface2));
  box-shadow:0 0 0 1px var(--accent)}
.lvl-row.done{opacity:.85}
.lvl-row.locked{opacity:.55}
.lvl-row .e{font-size:22px;width:30px;text-align:center;flex-shrink:0;margin-top:2px}
.lvl-row .st{margin-top:4px}
.lvl-row .t{flex:1;min-width:0}
.lvl-row .t b{font-size:13.5px;color:var(--text);display:block}
.lvl-row .t span{font-size:11px;color:var(--muted)}
.lvl-row .st{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:7px;flex-shrink:0;white-space:nowrap}
.lvl-row .st.now{background:var(--accent);color:#fff}
.lvl-row .st.ok{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.lvl-row .st.togo{background:var(--surface3);color:var(--muted)}
.lvl-mems{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.lvl-mem{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 4px;border-radius:99px;
  background:var(--surface3);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer}
.lvl-mem:hover{border-color:var(--accent);color:var(--text)}
.lvl-mem.me{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,var(--surface3));color:var(--text)}
.lvl-mem .av-xs{width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff}
.lvl-mems .none{font-size:10.5px;color:var(--muted);padding:2px 0}
.lvl-close{width:100%;margin-top:10px;padding:11px;border:none;border-radius:11px;cursor:pointer;
  background:var(--surface3);color:var(--text2);font-weight:700;font-size:13px;font-family:'Noto Sans KR',sans-serif}
.lvl-close:hover{background:var(--border)}
.lv-badge{cursor:pointer}
.lv-badge:hover{filter:brightness(1.12)}
/* ---------- 인바디 섹션 ---------- */
.ib-latest{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:9px;margin-bottom:14px}
.ib-stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 12px;text-align:center}
.ib-stat .l{font-size:10.5px;color:var(--muted);font-weight:700;margin-bottom:4px}
.ib-stat .v{font-family:'Archivo','DM Mono',monospace;font-weight:800;font-size:21px;color:var(--text);line-height:1.1}
.ib-stat .v small{font-size:10px;color:var(--muted);font-weight:600;margin-left:1px}
.ib-stat .chg{display:block;font-size:10.5px;font-weight:800;margin-top:4px;font-family:'DM Mono',monospace}
.ib-stat .chg.good{color:var(--green)} .ib-stat .chg.bad{color:var(--red)} .ib-stat .chg.eq{color:var(--muted)}
.ib-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:none;border-radius:11px;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:13px;
  font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 35%,transparent)}
.ib-btn:hover{filter:brightness(1.08)} .ib-btn:disabled{opacity:.55;cursor:default}
.ib-table{width:100%;border-collapse:collapse;font-size:12px}
.ib-table th{text-align:right;font-size:10.5px;color:var(--muted);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--border)}
.ib-table th:first-child{text-align:left}
.ib-table td{text-align:right;padding:7px 8px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;color:var(--text2)}

<script>
/* =================================================================
   오운완 대시보드 v3 "새벽 트랙" — 데이터 레이어
   기존 Google Apps Script 엔드포인트와 동일한 데이터 계약 유지
   (행 배열: [날짜/키, 멤버1, 멤버2, …] 형식)
   ================================================================= */
const API_BASE = 'https://script.google.com/macros/s/AKfycbzhCy5M8_IpwhJO2EUzrc74FEewXiSgyewm7B0IegufBODEvOWzalijZSvT75dZ-QSh/exec';
const API_URL = API_BASE + '?Q=dashboard';
const QUOTE_URL = API_BASE + '?Q=quotejson';
Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels.display = false; // 필요한 차트에서만 켠다

const MEMBERS = ['상','성경','보현','성우','상필','주현','정현','범진','재현','윤선','아현','윤경'];
const MEM_COLORS = MEMBERS.map((_,i)=>`hsl(${i*30},62%,56%)`);
const SPORT_COLORS = ['#ff6b3d','#ffd23f','#35cfe3','#6c8cff','#a78bfa','#f26d9d','#2edd8a','#fb923c','#ff5d7a','#9aa6bd'];
// 정규화된 종목 → 이모지 (달력 뷰용)
const SPORT_EMOJI = {
  '헬스':'🏋️','크로스핏':'🤸','클라이밍':'🧗','수영':'🏊','러닝':'🏃','등산':'🥾',
  '필라테스':'🧘','요가':'🧘','발레':'🩰','자전거':'🚴','골프':'⛳','홈트':'🏠',
  '줌바':'💃','로잉':'🚣','수중하키':'🏑','풋살':'⚽','배드민턴':'🏸','테니스':'🎾',
  '철인3종':'🏅','주짓수':'🥋','탁구':'🏓','농구':'🏀','스키':'⛷️','아이스하키':'🏒',
  '댄스':'💃','볼링':'🎳'
};
const sportEmoji = s => SPORT_EMOJI[s] || '💪';

// 폴백용 명언 — 스프레드시트 '명언' 시트(1,000개)를 ?Q=quotejson 으로 불러오며,
// 로딩 실패 시 아래 12개로 자동 대체됨
const FALLBACK_QUOTES = [
  {q:'무언가를 시작하기 위해 위대해질 필요는 없다. 하지만 위대해지기 위해서는 시작해야 한다.', by:'지그 지글러', role:'동기부여 연설가'},
  {q:'천 리 길도 한 걸음부터.', by:'노자', role:'도가의 창시자'},
  {q:'행동만이 두려움을 치료한다. 망설임과 미룸은 두려움을 키울 뿐이다.', by:'데이비드 슈워츠', role:'자기계발 작가'},
  {q:'우리가 반복적으로 하는 행동이 곧 우리 자신이다. 탁월함은 행동이 아니라 습관이다.', by:'아리스토텔레스', role:'철학자'},
  {q:'몸은 당신이 한 일을 기억한다. 오늘의 땀은 내일의 힘이다.', by:'작자 미상', role:''},
  {q:'가장 큰 영광은 한 번도 넘어지지 않는 것이 아니라, 넘어질 때마다 일어서는 것이다.', by:'넬슨 만델라', role:'정치인'},
  {q:'운동은 몸에 거는 가장 확실한 적금이다.', by:'작자 미상', role:''},
  {q:'시작하라. 그 자체가 천재성이고 힘이며 마법이다.', by:'괴테', role:'대문호'},
  {q:'오늘 할 수 있는 일에 전력을 다하라. 그러면 내일은 한 걸음 더 나아가 있을 것이다.', by:'아이작 뉴턴', role:'과학자'},
  {q:'습관은 처음엔 거미줄처럼 약하지만 나중엔 쇠줄처럼 강해진다.', by:'토마스 아 켐피스', role:'수도사'},
  {q:'꾸준함은 재능을 이긴다. 매일 나오는 사람을 이길 방법은 없다.', by:'작자 미상', role:''},
  {q:'미래는 자신의 꿈의 아름다움을 믿는 사람들의 것이다.', by:'엘리너 루스벨트', role:'영부인'},
];

/* ---------- 데이터 표시 기준 시작점 ----------
   집계·표시는 이 날짜(포함)부터. 그 이전(24년 등)은 S.legacy로 분리 보관해
   "이전 기록"으로만 참고 표시. 대시보드 전체 수치를 한 기준으로 통일하기 위함. */
const DATA_START = '2025-01-01';
const DATA_START_YM = DATA_START.slice(0,7);   // '2025-01'
// DATA_START부터 오늘까지 함께한 개월 수 (올림, 최소 1)
function monthsTogether(){
  const s=new Date(DATA_START);
  let m=(NOW.getFullYear()-s.getFullYear())*12 + (NOW.getMonth()-s.getMonth());
  if(NOW.getDate()>=s.getDate()) m+=1;   // 이번 달도 함께한 것으로 카운트
  return Math.max(1, m);
}

/* ---------- 레벨/칭호 시스템 (25.01~ 누적 운동일 기준) ---------- */
const LEVELS = [
  {min:300, lv:6, title:'오운완 레전드', e:'👑'},
  {min:200, lv:5, title:'아이언',       e:'🏔️'},
  {min:120, lv:4, title:'강철체력',     e:'🦾'},
  {min:60,  lv:3, title:'근성러',       e:'💪'},
  {min:25,  lv:2, title:'출석 요정',    e:'🏃'},
  {min:0,   lv:1, title:'운동 새싹',    e:'🌱'},
];
function levelInfo(totalAll){
  const cur = LEVELS.find(l=>totalAll>=l.min) || LEVELS[LEVELS.length-1];
  const next = LEVELS.filter(l=>l.min>cur.min).sort((a,b)=>a.min-b.min)[0] || null;
  const base = cur.min, cap = next ? next.min : null;
  const progress = cap ? Math.min(1,(totalAll-base)/(cap-base)) : 1;
  return {...cur, next, progress, need: cap ? cap-totalAll : 0};
}

/* ---------- 레벨 가이드 모달 ----------
   프로필의 레벨 배지를 클릭하면 전체 레벨 체계 · 기준 · 현재 위치를 보여줌 */
function openLevelGuide(){
  const name=S.selMember||MEMBERS[0];
  const total=activeDates(name).size;
  const lv=levelInfo(total);
  // 전체 멤버를 각자 레벨로 분류 (누적 많은 순 정렬)
  const byLv={};
  MEMBERS.forEach(n=>{
    const t=activeDates(n).size;
    const l=levelInfo(t);
    (byLv[l.lv]=byLv[l.lv]||[]).push({n,t});
  });
  Object.values(byLv).forEach(arr=>arr.sort((a,b)=>b.t-a.t));
  const asc=[...LEVELS].sort((a,b)=>a.min-b.min);
  const rows=asc.map((l,i)=>{
    const nextMin=asc[i+1]?asc[i+1].min:null;
    const range=nextMin!==null?`${l.min}~${nextMin-1}회`:`${l.min}회 이상`;
    const isCur=l.lv===lv.lv;
    const done=total>=(nextMin!==null?nextMin:l.min)&&!isCur;
    const cls=isCur?'cur':done?'done':'locked';
    const st=isCur
      ?`<span class="st now">현재 ${total}회</span>`
      :done?`<span class="st ok">달성 ✓</span>`
      :`<span class="st togo">${l.min-total}회 남음</span>`;
    const mems=byLv[l.lv]||[];
    const chips=mems.length
      ?mems.map(m=>`<span class="lvl-mem ${m.n===name?'me':''}" title="${m.n} · 누적 ${m.t}회"
          onclick="closeLevelGuide();openMember('${m.n}')">
          <span class="av-xs" style="background:${avatarColor(m.n)}">${initial(m.n)}</span>${m.n}</span>`).join('')
      :`<span class="none">아직 이 레벨의 멤버가 없어요</span>`;
    return `<div class="lvl-row ${cls}">
      <span class="e">${l.e}</span>
      <div class="t"><b>Lv.${l.lv} ${l.title} <span style="font-weight:600;color:var(--muted);font-size:11px">· ${mems.length}명</span></b>
        <span>누적 ${range}</span>
        <div class="lvl-mems">${chips}</div>
      </div>
      ${st}</div>`;
  }).join('');
  document.getElementById('lvlModal').innerHTML=`
    <h3>🏅 레벨 가이드</h3>
    <div class="sub"><b style="color:var(--text2)">${name}</b>님의 <b style="color:var(--text2)">25.01~ 누적 운동일</b> 기준이에요.
      하루에 여러 운동을 해도 <b style="color:var(--text2)">1일 1회</b>로 계산되고, 멤버를 누르면 그 사람 기록으로 이동해요.
      ${lv.next?`다음 레벨 <b style="color:var(--accent)">${lv.next.e} ${lv.next.title}</b>까지 <b style="color:var(--accent)">${lv.need}회</b> 남았어요!`:'이미 최고 레벨이에요 👑'}</div>
    ${rows}
    <button class="lvl-close" onclick="closeLevelGuide()">닫기</button>`;
  document.getElementById('lvlOverlay').classList.add('open');
}
function closeLevelGuide(){document.getElementById('lvlOverlay').classList.remove('open');}

let S = {
  raw:[],            // [{date:'YYYY-MM-DD', data:{name:[sports]}}]  ← 25.01~ 만
  monthly:{},        // {'YYYY-MM':{name:count}}                     ← 25.01~ 만
  legacy:{           // 24년 이전 "이전 기록" (참고용, 집계엔 미포함)
    perMember:{},    //   {name:count}
    total:0,         //   전체 이전 기록 일수 합
    firstDate:null,  //   가장 오래된 기록일
    monthly:{},      //   {'YYYY-MM':{name:count}}  (필요 시 확장용)
  },
  stats:{target:{},remain:{},rate:{},cumul:{}},
  selMonth:null,
  selMember:null,
  quote:null,        // 서버에서 받은 오늘의 명언 (없으면 폴백)
  rankMode:'month',  // 랭킹 탭 기간 모드: 'month' | 'year'
  rankYear:null,     // 연간 모드에서 선택한 연도
  vsA:null, vsB:null,// VS 비교 대상 두 명
};
let CHARTS = {};
let curPage = 'home';

const NOW = new Date();
const nowYM = `${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}`;
const TODAY = `${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}-${String(NOW.getDate()).padStart(2,'0')}`;
const startOfYear = new Date(NOW.getFullYear(),0,1);
const yearPct = ((NOW - startOfYear)/(365.25*24*3600*1000)*100).toFixed(1);
const DOW_KR = ['일','월','화','수','목','금','토'];

const avatarColor = n => MEM_COLORS[MEMBERS.indexOf(n)] || 'var(--muted)';
const initial = n => n.slice(0,1);  // 한 글자 이니셜(앞글자)
const todayQuote = () => S.quote || FALLBACK_QUOTES[(NOW.getFullYear()*1000 + dayOfYear(NOW)) % FALLBACK_QUOTES.length];

/* ---------- 페이스 판정 공통 로직 ----------
   달성률(r = 누적/목표)을 연 경과율(expected)과 비교해 색 등급을 매김.
   - r >= expected           → 초록 (페이스 유지/초과)
   - r >= expected*0.85      → 노랑 (조금 뒤처짐)
   - 그 외                   → 빨강 (많이 뒤처짐)
   PACE_MID_FACTOR: 노랑/빨강 경계 계수 (0.85). 이 값을 바꾸면 색 기준이 함께 이동함. */
const PACE_MID_FACTOR = 0.85;
function expectedRate(){ return parseFloat(yearPct)/100; }
function paceGrade(r){
  const e=expectedRate();
  if(r>=e)                 return {level:'green', c:'',    col:'var(--green)'};
  if(r>=e*PACE_MID_FACTOR) return {level:'amber', c:'mid', col:'var(--amber)'};
  return {level:'red', c:'low', col:'var(--red)'};
}
// 올해 남은 날짜 수 (오늘 제외, 12/31까지). 하루 최대 1회 제약과 임계선 이동 계산에 사용.
function daysLeftThisYear(){
  const end=new Date(NOW.getFullYear(),11,31);
  return Math.max(0, Math.ceil((end - NOW)/86400000));
}
// 하루당 경과율 증가폭(비율). 임계선이 시간에 따라 오르는 속도.
const RATE_PER_DAY = 1/365.25;

/* 다음 색 등급 도달까지 며칠 더 필요한가 — 정밀 버전.
   색 기준(expected)은 시간이 갈수록 계속 올라가고, 하루 최대 1회이므로
   "오늘부터 매일 하루도 안 빠지고 운동한다"고 가정하고, 며칠째에
   달성률(=(cumul+d)/target)이 그날의 임계선을 따라잡는지 시뮬레이션한다. */
function daysToNextGrade(cumul, target){
  if(!target) return null;
  const g=paceGrade(cumul/target);
  if(g.level==='green') return null;
  const toColor = g.level==='amber' ? 'green' : 'amber';
  const goalFactor = g.level==='amber' ? 1 : PACE_MID_FACTOR;
  const base = expectedRate();
  const left = daysLeftThisYear();
  for(let d=1; d<=left; d++){
    const expD = base + RATE_PER_DAY*d;
    const rD   = (cumul + d)/target;
    if(rD >= expD*goalFactor) return {toColor, need:d};
  }
  return {toColor, unreachable:true, daysLeft:left};
}

/* ---------- 연말 예상 프로젝션 ----------
   올해 누적을 연 경과일로 나눠 하루 페이스를 구하고 365일로 환산.
   해가 바뀐 직후(표본 7일 미만)엔 노이즈가 커서 표시하지 않음. */
function projectYearEnd(cumulYear){
  const elapsed = dayOfYear(NOW);
  if(elapsed < 7) return null;
  return Math.round(cumulYear / elapsed * 365);
}

// 서버에서 오늘의 명언 1개 받아오기 (실패해도 조용히 폴백)
async function loadQuote(){
  try{
    const res = await fetch(QUOTE_URL);
    if(!res.ok) return;
    const q = await res.json();
    if(q && q.q && !q.error) S.quote = q;
  }catch(e){ /* 폴백 유지 */ }
}
function dayOfYear(d){return Math.floor((d - new Date(d.getFullYear(),0,0))/86400000);}

/* ---------- 인바디 데이터 ----------
   ?Q=inbody : {records:[{ts,name,date,weight,smm,bfm,whr,vfl}], members:{name:{height,hasPin}}}
   POST      : {action:'setup'|'add'|'delete', name, pin, ...}
   서버(Apps Script)가 아직 업데이트 전이면 loaded=false 상태로 안내만 표시 */
S.inbody={loaded:false,records:[],members:{}};
async function loadInbody(){
  try{
    const res=await fetch(API_BASE+'?Q=inbody');
    if(!res.ok) return;
    const j=await res.json();
    if(j && !j.error && Array.isArray(j.records)){
      S.inbody={loaded:true,records:j.records,members:j.members||{}};
    }
  }catch(e){ /* 미연결 상태 유지 */ }
}
async function ibPost(payload){
  // text/plain 으로 보내 preflight(CORS 사전요청)를 피함 — Apps Script 웹앱 표준 패턴
  const res=await fetch(API_BASE,{method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

function toggleTheme(){

  const next = cur==='dark'?'light':'dark';

  document.getElementById('themeBtn').textContent = next==='dark'?'🌙':'☀️';

function goPage(p){
  curPage = p;
  document.querySelectorAll('.tab, .bn-item').forEach(t=>t.classList.toggle('active', t.dataset.page===p));
  document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
  const target = document.getElementById('page-'+p);
  if(target) target.classList.add('active');
  // ---- 지연 렌더링: 탭이 화면에 보이는 상태에서 그려야 차트 크기가 올바름 ----
  if(S.raw.length || S.legacy.total){
    if(PAGE_DIRTY[p]) renderPage(p);
    else requestAnimationFrame(()=>{ // 이미 렌더된 페이지: 혹시 모를 0크기 차트 보정
      Object.values(CHARTS).forEach(c=>{try{c.resize();}catch(e){}});
    });
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function parse(rows){
  S.raw=[]; S.monthly={}; S.stats={target:{},remain:{},rate:{},cumul:{}};
  S.legacy={perMember:{}, total:0, firstDate:null, monthly:{}};
  const dateRe=/^\d{4}-\d{2}-\d{2}/;
  function toKSTDate(raw){
    const s=String(raw||'');
    if(!dateRe.test(s)) return null;
    if(s.includes('T')){const d=new Date(s);return new Date(d.getTime()+9*3600*1000).toISOString().slice(0,10);}
    return s.slice(0,10);
  }
  for(const r of rows){
    const key=String(r[0]||'').trim();
    if(key==='목표 일수') MEMBERS.forEach((n,j)=>S.stats.target[n]=+r[j+1]||0);
    if(key==='남은 횟수') MEMBERS.forEach((n,j)=>S.stats.remain[n]=+r[j+1]||0);
    if(key==='달성률')    MEMBERS.forEach((n,j)=>S.stats.rate[n]=+r[j+1]||0);
    if(key==='누적')      MEMBERS.forEach((n,j)=>S.stats.cumul[n]=+r[j+1]||0);
  }
  for(const r of rows){
    const date=toKSTDate(r[0]);
    if(!date||date>TODAY) continue;
    const hasData=MEMBERS.some((_,j)=>{const c=String(r[j+1]||'').trim();return c&&isNaN(Number(c));});
    if(!hasData) continue;
    const month=date.slice(0,7);
    // ---- DATA_START 이전은 '이전 기록'(S.legacy)으로 분리, 집계엔 미포함 ----
    const isLegacy = date < DATA_START;
    if(isLegacy){
      for(let j=0;j<MEMBERS.length;j++){
        const c=String(r[j+1]||'').trim();
        if(c&&isNaN(Number(c))){
          const n=MEMBERS[j];
          S.legacy.perMember[n]=(S.legacy.perMember[n]||0)+1;
          S.legacy.total++;
          if(!S.legacy.monthly[month]) S.legacy.monthly[month]={};
          S.legacy.monthly[month][n]=(S.legacy.monthly[month][n]||0)+1;
          if(!S.legacy.firstDate || date<S.legacy.firstDate) S.legacy.firstDate=date;
        }
      }
      continue; // S.raw / S.monthly 에는 넣지 않음
    }
    if(!S.monthly[month]) S.monthly[month]={};
    const entry={date,data:{}};
    for(let j=0;j<MEMBERS.length;j++){
      const c=String(r[j+1]||'').trim();
      if(c&&isNaN(Number(c))){
        // ',' '·' '、' = 여러 운동 구분 / '/' = 운동 뒤 세부부위(예: 헬스/가슴) → 앞부분만 사용
        const raw=c.split(/[,·、]+/).map(s=>s.split('/')[0].trim()).filter(Boolean);
        // 정규화 후 같은 종목 중복 제거(예: 헬스/가슴 → 헬스 1개)
        const seen=new Set(), sports=[];
        for(const s of raw){const k=normSport(s)||s; if(!seen.has(k)){seen.add(k); sports.push(s);}}
        entry.data[MEMBERS[j]]=sports;
        S.monthly[month][MEMBERS[j]]=(S.monthly[month][MEMBERS[j]]||0)+1;
      }
    }
    if(Object.keys(entry.data).length) S.raw.push(entry);
  }
  S.raw.sort((a,b)=>a.date.localeCompare(b.date));
  const months=Object.keys(S.monthly).sort();
  if(S.monthly[nowYM]) S.selMonth=nowYM;
  else if(!S.selMonth||!months.includes(S.selMonth)) S.selMonth=months[months.length-1];
  if(!S.selMember) S.selMember = bestMemberThisMonth() || MEMBERS[0];
  // VS 기본 매치업: 이달 1·2위
  const top2=Object.entries(S.monthly[S.selMonth]||{}).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
  if(!S.vsA) S.vsA = top2[0] || MEMBERS[0];
  if(!S.vsB) S.vsB = (top2[1] && top2[1]!==S.vsA) ? top2[1] : MEMBERS.find(n=>n!==S.vsA);
}

function bestMemberThisMonth(){
  const md=S.monthly[S.selMonth]||{};
  const e=Object.entries(md).sort((a,b)=>b[1]-a[1])[0];
  return e?e[0]:null;
}

/* ---------- 파생 지표: 스트릭 계산 ---------- */
// 멤버별 운동한 날짜 집합
function activeDates(name){
  return new Set(S.raw.filter(e=>e.data[name]).map(e=>e.date));
}
// 현재 연속 스트릭(오늘 또는 어제까지 이어진 연속일), 최장 스트릭, 마지막 운동일
function streakInfo(name){
  const dates=[...activeDates(name)].sort();
  if(!dates.length) return {current:0,longest:0,last:null,daysSince:Infinity};
  const set=new Set(dates);
  // 최장
  let longest=0,run=0,prev=null;
  for(const d of dates){
    if(prev && (new Date(d)-new Date(prev))===86400000) run++; else run=1;
    longest=Math.max(longest,run); prev=d;
  }
  // 현재: 오늘 또는 어제부터 거꾸로
  const last=dates[dates.length-1];
  const daysSince=Math.round((new Date(TODAY)-new Date(last))/86400000);
  let current=0;
  if(daysSince<=1){
    let cursor=last;
    while(set.has(cursor)){
      current++;
      cursor=new Date(new Date(cursor).getTime()-86400000).toISOString().slice(0,10);
    }
  }
  return {current,longest,last,daysSince};
}

/* ---------- 종목 정규화 ---------- */
function normSport(s){
  s=s.trim();
  if(MEMBERS.includes(s)) return null; // 멤버명이 종목칸에 잘못 들어간 경우 제외
  if(/헬스|가슴|상체|하체|등$|^등 |팔|하이로|웨이트/.test(s))return'헬스';
  if(/클핏|크로스핏|F45/i.test(s))return'크로스핏';
  if(/클라이밍|클릿|볼더/.test(s))return'클라이밍';
  if(/바다수영|수영/.test(s))return'수영';
  if(/러닝|달리기|런|마라톤|걷기/.test(s))return'러닝';
  if(/등산|트래킹|트레킹|하이킹|트래일/.test(s))return'등산';
  if(/필라테스|필테/.test(s))return'필라테스';
  if(/요가/.test(s))return'요가';
  if(/발레/.test(s))return'발레';
  if(/자전거|사이클/.test(s))return'자전거';
  if(/골프/.test(s))return'골프';
  if(/홈트|홈/.test(s))return'홈트';
  if(/줌바|좀바|zumba/i.test(s))return'줌바';
  if(/로잉|로윙/.test(s))return'로잉';
  if(/수중/.test(s))return'수중하키';
  if(/풋살/.test(s))return'풋살';
  if(/배드민턴/.test(s))return'배드민턴';
  if(/테니/.test(s))return'테니스';
  if(/철인|듀애슬론|아쿠아슬론|트라이애슬론/.test(s))return'철인3종';
  if(/주짓수|유도/.test(s))return'주짓수';
  if(/탁구/.test(s))return'탁구';
  if(/농구/.test(s))return'농구';
  if(/스키|보드|썰매/.test(s))return'스키';
  if(/하키/.test(s))return'아이스하키';
  if(/댄스/.test(s))return'댄스';
  if(/볼링/.test(s))return'볼링';
  return s||'기타';
}
function sportMapFor(entries){
  const m={};
  for(const e of entries)for(const[name,sports]of Object.entries(e.data))for(const s of sports){
    const k=normSport(s);
    if(!k)continue;
    if(!m[k])m[k]={total:0,per:{}};
    m[k].total++; m[k].per[name]=(m[k].per[name]||0)+1;
  }
  return m;
}

/* ---------- 지연 렌더링 시스템 ----------
   숨겨진 탭(display:none)에서 Chart.js를 생성하면 canvas 크기가 0으로 잡혀
   빈 차트가 되는 문제가 있어, "지금 보이는 탭"만 그리고 나머지는
   dirty 표시 후 탭 진입 시점에 그린다. */
const PAGE_DIRTY = {home:true, rank:true, data:true, vs:true, me:true};
// 페이지별 소유 차트 키 (페이지 재렌더 전 해당 차트만 파기해 메모리 누수 방지)
const PAGE_CHARTS = {
  home:[], rank:['yearMonthly'],
  data:['stacked','cumul','weekday','trend','groupDonut','season'],
  vs:['vsRadar','vsDuel','vsWeekday'],
  me:['donut','profTrend','inbodyTrend'],
};
function destroyPageCharts(p){
  (PAGE_CHARTS[p]||[]).forEach(k=>{
    if(CHARTS[k]){try{CHARTS[k].destroy();}catch(e){} delete CHARTS[k];}
  });
}
function renderPage(p){
  destroyPageCharts(p);
  if(p==='home') renderHome();
  else if(p==='rank') renderRank();
  else if(p==='data') renderData();
  else if(p==='vs') renderVS();
  else if(p==='me') renderMe();
  PAGE_DIRTY[p]=false;
}
function markDirty(pages){ pages.forEach(p=>PAGE_DIRTY[p]=true); }

function renderAll(){
  destroyAll();
  buildTicker();
  markDirty(['home','rank','data','vs','me']);
  renderPage(curPage);   // 지금 보이는 탭만 즉시 렌더, 나머지는 진입 시
}

/* ---------- 인사이트 엔진 (규칙 기반) ----------
   데이터에서 "지금 말할 가치가 있는 것"을 찾아 카드로 요약.
   각 규칙은 {e:이모지, t:제목(HTML), s:부연, c:색, w:가중치} 반환. 상위 6개 노출. */
function buildInsights(){
  const cards=[];
  const md=S.monthly[S.selMonth]||{};
  const todayEntry=S.raw.find(e=>e.date===TODAY);
  const doneNames=todayEntry?Object.keys(todayEntry.data):[];

  // 1) 전원 달성
  if(doneNames.length===MEMBERS.length)
    cards.push({e:'🎉',t:`오늘 <b>전원 달성</b>!`,s:'12명이 모두 불을 켠 날. 캡처해 두세요.',c:'var(--accent2)',w:100});

  // 2) 이번 주 모멘텀 (월~오늘 vs 지난주 같은 구간)
  {
    const dow=NOW.getDay(); const monday=new Date(NOW); monday.setDate(NOW.getDate()-((dow+6)%7));
    const wkStart=monday.toISOString().slice(0,10);
    const prevMon=new Date(monday.getTime()-7*86400000).toISOString().slice(0,10);
    const prevEnd=new Date(new Date(TODAY).getTime()-7*86400000).toISOString().slice(0,10);
    const cnt=r=>{let c=0;for(const e of S.raw){if(e.date>=r[0]&&e.date<=r[1])c+=Object.keys(e.data).length;}return c;};
    const cur=cnt([wkStart,TODAY]), prev=cnt([prevMon,prevEnd]);
    if(prev>0){
      const diff=Math.round((cur-prev)/prev*100);
      if(diff>=10) cards.push({e:'📈',t:`이번 주 그룹 활동 <b>+${diff}%</b>`,s:`지난주 같은 요일까지 ${prev}회 → 이번 주 ${cur}회`,c:'var(--green)',w:60});
      else if(diff<=-10) cards.push({e:'📉',t:`이번 주 그룹 활동 <b>${diff}%</b>`,s:`지난주 ${prev}회 → 이번 주 ${cur}회. 오늘 한 명이 흐름을 바꿔요`,c:'var(--red)',w:55});
    }
  }

  // 3) 스트릭 신기록 감시
  {
    const watch=MEMBERS.map(n=>({n,...streakInfo(n)}))
      .filter(x=>x.current>=3 && x.longest>=4 && (x.longest-x.current)<=2)
      .sort((a,b)=>(a.longest-a.current)-(b.longest-b.current))[0];
    if(watch){
      const gap=watch.longest-watch.current;
      cards.push(gap<=0
        ? {e:'🏅',t:`<b>${watch.n}</b> 최장 스트릭 <b>신기록 진행 중</b>`,s:`${watch.current}일 연속 — 매일이 새 기록입니다`,c:'var(--accent2)',w:80}
        : {e:'⏱️',t:`<b>${watch.n}</b> 신기록까지 <b>${gap+1}일</b>`,s:`현재 ${watch.current}일 연속 · 최장 ${watch.longest}일`,c:'var(--accent)',w:70});
    }
  }

  // 4) 이달 라이징 스타 (전월 대비 증가 최대)
  {
    const prevYM=prevMonthOf(S.selMonth), pmd=S.monthly[prevYM]||{};
    const rise=MEMBERS.map(n=>({n,d:(md[n]||0)-(pmd[n]||0),cur:md[n]||0}))
      .filter(x=>x.d>=3&&x.cur>0).sort((a,b)=>b.d-a.d)[0];
    if(rise) cards.push({e:'🚀',t:`이달의 라이징 스타 <b>${rise.n}</b>`,s:`전월 대비 +${rise.d}일 (이달 ${rise.cur}일)`,c:'var(--pink)',w:50});
  }

  // 5) 그룹 무결석 릴레이 (누군가는 매일 운동한 연속일)
  {
    const set=new Set(S.raw.map(e=>e.date));
    let cursor = set.has(TODAY)?TODAY:new Date(new Date(TODAY).getTime()-86400000).toISOString().slice(0,10);
    let run=0;
    while(set.has(cursor)){run++;cursor=new Date(new Date(cursor).getTime()-86400000).toISOString().slice(0,10);}
    if(run>=7) cards.push({e:'🔗',t:`그룹 무결석 릴레이 <b>${run}일째</b>`,s:'매일 최소 한 명은 운동 중 — 바통을 이어가요',c:'var(--cyan)',w:45});
  }

  // 6) 연말 페이스 리더
  {
    const year=String(NOW.getFullYear());
    const lead=MEMBERS.map(n=>{
      const c=Object.keys(S.monthly).filter(ym=>ym.startsWith(year)).reduce((s,ym)=>s+(S.monthly[ym]?.[n]||0),0);
      const t=S.stats.target[n]||0;
      return {n,rate:t?c/t:0,proj:projectYearEnd(c),t};
    }).filter(x=>x.t>0).sort((a,b)=>b.rate-a.rate)[0];
    if(lead&&lead.proj) cards.push({e:'🧭',t:`페이스 1위 <b>${lead.n}</b> · 달성률 ${(lead.rate*100).toFixed(0)}%`,s:`이 페이스면 연말 예상 약 ${lead.proj}일`,c:'var(--green)',w:40});
  }

  // 7) 이번 달 새 종목
  {
    const monthSports=new Set(Object.keys(sportMapFor(S.raw.filter(e=>e.date.startsWith(S.selMonth)))));
    const before=new Set(Object.keys(sportMapFor(S.raw.filter(e=>e.date<S.selMonth+'-01'))));
    const news=[...monthSports].filter(s=>!before.has(s));
    if(news.length) cards.push({e:'✨',t:`새 종목 등장: <b>${news.slice(0,3).join(', ')}</b>`,s:'이번 달 처음 기록된 운동이에요',c:'var(--purple)',w:35});
  }

  // 8) 이번 달 가장 뜨거운 요일
  {
    const wd=[0,0,0,0,0,0,0];
    for(const e of S.raw){if(!e.date.startsWith(S.selMonth))continue;wd[new Date(e.date).getDay()]+=Object.keys(e.data).length;}
    const mx=Math.max(...wd);
    if(mx>=5) cards.push({e:'📅',t:`이달 최애 요일은 <b>${DOW_KR[wd.indexOf(mx)]}요일</b>`,s:`${mx}회 운동 — 우리 그룹의 리듬`,c:'var(--blue)',w:25});
  }

  const top=cards.sort((a,b)=>b.w-a.w).slice(0,6);
  document.getElementById('insRow').innerHTML = top.length
    ? top.map(c=>`<div class="ins-card" style="--ins-c:${c.c}"><span class="e">${c.e}</span>
        <div><div class="t">${c.t}</div><div class="s">${c.s}</div></div></div>`).join('')
    : `<div class="ins-card"><span class="e">🌱</span><div><div class="t">데이터가 쌓이는 중</div><div class="s">기록이 더 모이면 인사이트가 나타나요</div></div></div>`;
}

function statCard(label,val,unit,sub,color,small,dec){
  const isNum = !small && val!=='' && !isNaN(parseFloat(val));
  const valHtml = isNum
    ? `<span class="cu" data-count="${val}" data-dec="${dec||0}">0</span>`
    : `${val}`;
  return `<div class="stat-card"><div class="bar" style="background:${color}"></div>
    <div class="s-label">${label}</div>
    <div class="s-val" style="color:${color};${small?'font-size:21px;font-family:\'Noto Sans KR\',sans-serif':''}">${valHtml}<span style="font-size:13px;color:var(--muted);font-weight:600">${unit}</span></div>
    <div class="s-sub">${sub}</div></div>`;
}

function buildStreakGrid(elId){
  const arr=MEMBERS.map(n=>({n,...streakInfo(n)}))
    .sort((a,b)=>b.current-a.current || b.longest-a.longest);
  document.getElementById(elId).innerHTML = arr.map(x=>{
    let chip,cls='';
    if(x.daysSince<=1 && x.current>0){chip=`<span class="alert-chip safe">진행중</span>`;}
    else if(x.daysSince===2){chip=`<span class="alert-chip warn">하루 쉼</span>`;cls='warn';}
    else if(x.daysSince===Infinity){chip=`<span class="alert-chip">기록없음</span>`;}
    else {chip=`<span class="alert-chip">${x.daysSince}일째 휴식</span>`;}
    const cold = !(x.daysSince<=1 && x.current>0);
    return `<div class="streak-card" onclick="openMember('${x.n}')">
      <div class="name-row">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="av" style="background:${avatarColor(x.n)}">${initial(x.n)}</div>
          <span class="nm">${x.n}</span>
        </div>${chip}
      </div>
      <div class="streak-flame ${cold?'cold':''}">
        <span style="font-size:18px">${cold?'❄️':'🔥'}</span>
        <span class="num">${x.current}</span><span class="unit">일 연속</span>
      </div>
      <div class="streak-meta"><span>최장 <b>${x.longest}일</b></span><span>${x.last?x.last.slice(5):'—'} 마지막</span></div>
    </div>`;
  }).join('');
}

function buildFeed(elId, limit){
  const byDate={};
  for(const e of [...S.raw].reverse()){
    byDate[e.date]=byDate[e.date]||[];
    for(const[name,sports]of Object.entries(e.data)) byDate[e.date].push({name,sports});
  }
  let html='',cnt=0;
  for(const date of Object.keys(byDate).sort().reverse()){
    if(cnt>=limit)break;
    const dd=new Date(date);
    const label=`${dd.getMonth()+1}/${dd.getDate()} (${DOW_KR[dd.getDay()]})`;
    html+=`<div class="feed-day">${label} · ${byDate[date].length}명</div>`;
    for(const it of byDate[date]){
      if(cnt>=limit)break;
      const tags=it.sports.map(normSport).filter(Boolean).map(s=>`<span class="tag">${s}</span>`).join('');
      html+=`<div class="feed-item" onclick="openMember('${it.name}')">
        <div class="av" style="background:${avatarColor(it.name)}">${initial(it.name)}</div>
        <span class="nm">${it.name}</span><span class="sp">${tags}</span></div>`;
      cnt++;
    }
  }
  document.getElementById(elId).innerHTML = html || `<div class="empty-hint"><span class="ic">🗓️</span>아직 기록이 없어요</div>`;
}

function buildTicker(){
  const items=[];
  for(const e of [...S.raw].reverse()){
    const st=MEMBERS.map(n=>({n,...streakInfo(n)})).reduce((a,x)=>{a[x.n]=x.current;return a;},{});
    for(const[name,sports]of Object.entries(e.data)){
      items.push({date:e.date.slice(5),name,sport:sports.map(normSport).filter(Boolean).join('·'),streak:st[name]||0});
      if(items.length>=12)break;
    }
    if(items.length>=12)break;
  }
  if(!items.length)return;
  const html=[...items,...items].map(it=>
    `<span class="tk-item"><span class="d">${it.date}</span><span class="n">${it.name}</span>
     <span class="s">${it.sport}</span>${it.streak>1?`<span class="fire">🔥${it.streak}</span>`:''}</span>`).join('');
  const t=document.getElementById('tickerTrack');
  if(t){t.innerHTML=html;}
}

        <span class="proj-chip">🧭 예상 N일</span>은 지금까지의 페이스가 연말까지 이어진다고 가정한 추정치 ·
        <span class="delta up">▲n</span>/<span class="delta dn">▼n</span> 은 전년 대비 순위가 n계단 오르내렸다는 뜻
      </div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="dot" style="background:var(--amber)"></span>🏅 ${y}년 종목 순위 + 장인</div><span class="card-sub">연간 전체</span></div>
        <div id="sportYear"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="dot" style="background:var(--purple)"></span>👑 누적 종목 순위 + 장인</div><span class="card-sub">25.01~ 전체</span></div>
        <div id="sportCumul"></div>
      </div>
    </div>`;

  buildYearHighlight(y, cumul);
  buildPodiumByMap('podium', cumul, '일');
  buildYearGoalCard(y, cumul);
  buildYearMonthlyChart(y);
  buildYearDiversity(y, prevY);
  buildYearLeaderboard(y, cumul, prevCumul);
  renderSportSection('sportYear', sportMapFor(S.raw.filter(r=>r.date.startsWith(y))));
  renderSportSection('sportCumul', sportMapFor(S.raw));
}

// 올해의 하이라이트 배너
function buildYearHighlight(y, cumul){
  const topMem=Object.entries(cumul).sort((a,b)=>b[1]-a[1])[0];
  const totalDays=Object.values(cumul).reduce((a,b)=>a+b,0);
  const activeDaySet=new Set(S.raw.filter(e=>e.date.startsWith(y)).map(e=>e.date));
  const monRows=[]; for(let mo=1;mo<=12;mo++){const ym=`${y}-${String(mo).padStart(2,'0')}`;
    monRows.push([mo, Object.values(S.monthly[ym]||{}).reduce((a,b)=>a+b,0)]);}
  const hotMon=monRows.slice().sort((a,b)=>b[1]-a[1])[0];
  let bestStreak={n:'—',v:0};
  MEMBERS.forEach(n=>{
    const ds=[...activeDates(n)].filter(d=>d.startsWith(y)).sort();
    let run=0,prev=null,mx=0;
    for(const d of ds){if(prev&&(new Date(d)-new Date(prev))===86400000)run++;else run=1;mx=Math.max(mx,run);prev=d;}
    if(mx>bestStreak.v)bestStreak={n,v:mx};
  });
  const cells=[
    {e:'🥇',v:topMem?topMem[0]:'—',l:`최다 운동 (${topMem?topMem[1]:0}일)`,c:'var(--gold)'},
    {e:'🔥',v:`${bestStreak.v}일`,l:`최장 연속 · ${bestStreak.n}`,c:'var(--red)'},
    {e:'📅',v:`${hotMon[1]}일`,l:`가장 뜨거운 달 · ${hotMon[0]}월`,c:'var(--cyan)'},
    {e:'💪',v:`${totalDays}일`,l:`그룹 총 운동 (${activeDaySet.size}일 활동)`,c:'var(--accent)'},
  ];
  document.getElementById('yearHighlight').innerHTML=`
    <div class="hl-banner">
      ${cells.map(x=>`<div class="hl-cell">
        <div class="hl-e">${x.e}</div>
        <div class="hl-v" style="color:${x.c}">${x.v}</div>
        <div class="hl-l">${x.l}</div></div>`).join('')}
    </div>`;
}

// 연간 월별 그룹 활동 막대

// 종목 다양성 + 신규 도전
function buildYearDiversity(y, prevY){
  const yearSports=new Set(Object.keys(sportMapFor(S.raw.filter(e=>e.date.startsWith(y)))));
  const beforeSports=new Set(Object.keys(sportMapFor(S.raw.filter(e=>e.date<`${y}-01-01`))));
  const newSports=[...yearSports].filter(s=>!beforeSports.has(s));
  const memSports={}; MEMBERS.forEach(n=>memSports[n]=new Set());
  for(const e of S.raw){if(!e.date.startsWith(y))continue;
    for(const[n,sp]of Object.entries(e.data))for(const s of sp){const k=normSport(s);if(k)memSports[n].add(k);}}
  const allrounder=Object.entries(memSports).map(([n,set])=>[n,set.size]).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('yearDiversity').innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div class="mini-stat" style="flex:1;background:var(--surface2)">
        <div class="v" style="color:var(--pink)">${yearSports.size}</div><div class="l">시도한 종목</div></div>
      <div class="mini-stat" style="flex:1;background:var(--surface2)">
        <div class="v" style="color:var(--green)">${allrounder?allrounder[1]:0}</div><div class="l">올라운더 · ${allrounder?allrounder[0]:'—'}</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">✨ ${y}년 새로 등장한 종목</div>
    ${newSports.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${newSports.map(s=>`<span class="tag" style="display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;padding:4px 10px">${sportEmoji(s)} ${s}</span>`).join('')}</div>`
      : `<div style="font-size:12px;color:var(--muted)">새로 추가된 종목 없음 — 꾸준히 해오던 종목들로 채운 해네요 👏</div>`}`;
}

// 연간 목표 달성 현황
function buildYearGoalCard(y, cumul){
  const isCur=y===String(NOW.getFullYear());
  const rows=MEMBERS.map(n=>({n,c:cumul[n],t:S.stats.target[n]||0}))
    .map(x=>({...x,rate:x.t?x.c/x.t:0}))
    .sort((a,b)=>b.rate-a.rate);
  const reached=rows.filter(x=>x.c>=x.t&&x.t>0).length;
  const totalC=MEMBERS.reduce((s,n)=>s+cumul[n],0);
  const totalT=MEMBERS.reduce((s,n)=>s+(S.stats.target[n]||0),0);
  const groupPct=totalT?Math.round(totalC/totalT*100):0;
  const top=rows.slice(0,6);
  document.getElementById('yearGoalCard').innerHTML=`
    <div class="card-head"><div class="card-title"><span class="dot" style="background:var(--cyan)"></span>🎯 ${y}년 목표 달성 현황</div>
      <span class="card-sub">${isCur?`기준 ${yearPct}% 경과`:'연말 마감'}</span></div>
    <div class="chal-goal-bar"><div class="chal-goal-fill" style="width:${Math.min(100,groupPct)}%"><span class="v">${groupPct}%</span></div></div>
    <div class="chal-goal-label"><span>그룹 합산 ${totalC} / ${totalT}일</span><span>목표 달성 <b style="color:var(--green)">${reached}명</b></span></div>
    <div class="chal-list">
      ${top.map((x,i)=>{const pct=(x.rate*100).toFixed(0);const done=x.c>=x.t&&x.t>0;
        return `<div class="chal-row">
          <span class="medal">${done?'✅':['🥇','🥈','🥉','','',''][i]||''}</span>
          <span class="nm">${x.n}</span>
          <div class="track"><div class="fill" style="width:${Math.min(100,x.rate*100)}%;background:${done?'var(--green)':avatarColor(x.n)}"></div></div>
          <span class="v">${pct}%</span></div>`;}).join('')}
    </div>`;
}

// 연간 순위표 (+연말 예상 프로젝션)
function buildYearLeaderboard(y, cumul, prevCumul){
  const prevRank={}; Object.entries(prevCumul).sort((a,b)=>b[1]-a[1]).forEach(([n],i)=>prevRank[n]=i+1);
  const isCur=y===String(NOW.getFullYear());
  const sorted=MEMBERS.map(n=>({name:n,cumul:cumul[n],target:S.stats.target[n]||0,
    rate:S.stats.target[n]?cumul[n]/S.stats.target[n]:0})).sort((a,b)=>b.cumul-a.cumul);
  const rows=sorted.map((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const pr=prevRank[p.name];
    let delta='';
    if(pr){const d=pr-(i+1);
      delta=d>0?`<span class="delta up" title="전년 대비 순위 ${d}계단 상승">▲${d}</span>`
        :d<0?`<span class="delta dn" title="전년 대비 순위 ${-d}계단 하락">▼${-d}</span>`
        :`<span class="delta eq" title="전년과 순위 동일">—</span>`;}
    const pct=(p.rate*100).toFixed(1),pn=parseFloat(pct),{c,col}=paceGrade(p.rate);
    const nextChip=nextGradeChip(p.cumul, p.target);
    // 연말 예상 (올해만)
    let projChip='';
    if(isCur){
      const proj=projectYearEnd(p.cumul);
      if(proj!==null){
        const hit=p.target>0&&proj>=p.target;
        projChip=` · <span class="proj-chip ${hit?'hit':''}" title="지금 페이스가 연말까지 이어질 때의 추정치">🧭 예상 ${proj}일${hit?' ✓':''}</span>`;
      }
    }
    return `<tr onclick="openMember('${p.name}')">
      <td><span class="rank-badge ${rc}">${i+1}</span></td>
      <td><span class="av-sm" style="background:${avatarColor(p.name)}">${initial(p.name)}</span><b>${p.name}</b></td>
      <td style="font-family:'Archivo',sans-serif;font-weight:800">${p.cumul}<span style="color:var(--muted);font-size:10px">일</span> ${delta}</td>
      <td><div class="pbar-row"><div class="pbar"><div class="pfill ${c}" style="width:${Math.min(100,pn)}%"></div></div>
        <span class="pct" style="color:${col}">${pct}%</span></div>
        <div class="rate-detail">${p.cumul}/${p.target}일${nextChip}${projChip}</div></td></tr>`;
  }).join('');
  document.getElementById('lbTableYear').innerHTML=`<thead><tr><th>#</th><th>이름</th><th>연 누적</th><th>목표 달성률</th></tr></thead><tbody>${rows}</tbody>`;
}

// 순위표 rate-detail 뒤에 붙일 "다음 색까지 +N일" 칩
function nextGradeChip(cumul, target){
  const nx=daysToNextGrade(cumul, target);
  if(!nx) return '';
  const toGreen = nx.toColor==='green';
  const dotEmoji = toGreen ? '🟢' : '🟡';
  const cls = toGreen ? 'to-green' : 'to-amber';
  const colorName = toGreen ? '초록불' : '노란불';
  if(nx.unreachable){
    return ` · <span class="next-chip unreachable" title="남은 ${nx.daysLeft}일 동안 매일 운동해도 올해 안엔 ${colorName} 도달이 어려워요">⚠️ 연내 어려움</span>`;
  }
  return ` · <span class="next-chip ${cls}" title="오늘부터 매일 운동하면 ${nx.need}일째에 ${colorName}로 바뀌어요 (하루 1회 · 색 기준 상승 반영)">${dotEmoji} ${nx.need}일 필요</span>`;
}

// 범용 시상대 (임의 {name:count} 맵 기반)
function buildPodiumByMap(elId, map, unit){
  const top=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(top.length<3||top[0][1]===0){document.getElementById(elId).innerHTML=`<div class="empty-hint" style="padding:24px"><span class="ic">🥇</span>아직 순위를 매길 데이터가 부족해요</div>`;return;}
  const order=[top[1],top[0],top[2]],place=[2,1,3];
  document.getElementById(elId).innerHTML=order.map((e,i)=>{
    const[name,cnt]=e;const p=place[i];const medal=p===1?'🥇':p===2?'🥈':'🥉';
    return `<div class="pod pod-${p}" onclick="openMember('${name}')" style="cursor:pointer">
      <div style="font-size:18px">${medal}</div>
      <div class="av" style="background:${avatarColor(name)}">${initial(name)}</div>
      <div class="nm">${name}</div><div class="sc">${cnt}${unit}</div>
      <div class="stand">${p}</div></div>`;
  }).join('');
}

// 주간 그룹 챌린지: 이번 주(월~일) 그룹 전체 운동 횟수 목표
function buildWeeklyChallenge(){
  const dow=NOW.getDay(); const monday=new Date(NOW); monday.setDate(NOW.getDate()-((dow+6)%7));
  const weekStart=monday.toISOString().slice(0,10);
  const weekEntries=S.raw.filter(e=>e.date>=weekStart && e.date<=TODAY);
  let groupCount=0; const perMember={};
  for(const e of weekEntries)for(const n of Object.keys(e.data)){groupCount++;perMember[n]=(perMember[n]||0)+1;}
  const GOAL=40; // 주간 그룹 목표 (12명 × 약 3~4회)
  const pct=Math.min(100, Math.round(groupCount/GOAL*100));
  const top=Object.entries(perMember).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=top[0]?top[0][1]:1;
  document.getElementById('weeklyChal').innerHTML=`
    <div class="chal-head"><div class="chal-title">⚡ 이번 주 그룹 챌린지</div>
      <span class="chal-period">${weekStart.slice(5)} ~ ${TODAY.slice(5)}</span></div>
    <div class="chal-goal-bar"><div class="chal-goal-fill" style="width:${pct}%"><span class="v">${groupCount}/${GOAL}</span></div></div>
    <div class="chal-goal-label"><span>그룹 합산 운동 횟수</span><span>${pct}% 달성</span></div>
    <div class="chal-list">
      ${top.map((e,i)=>{const[n,c]=e;return `<div class="chal-row">
        <span class="medal">${['🥇','🥈','🥉','',''][i]||''}</span>
        <span class="nm">${n}</span>
        <div class="track"><div class="fill" style="width:${c/maxV*100}%;background:${avatarColor(n)}"></div></div>
        <span class="v">${c}회</span></div>`;}).join('') || '<div class="empty-hint" style="padding:14px">이번 주 첫 운동을 시작해보세요!</div>'}
    </div>`;
}

// 월간 챌린지: 이달 그룹 전체 일수 vs 전월
function buildMonthlyChallenge(m){
  const md=S.monthly[m]||{};
  const total=Object.values(md).reduce((a,b)=>a+b,0);
  const prevYM=prevMonthOf(m);
  const prevTotal=Object.values(S.monthly[prevYM]||{}).reduce((a,b)=>a+b,0);
  const goal=prevTotal>0?Math.ceil(prevTotal*1.05):60; // 전월 대비 +5% 도전
  const pct=Math.min(100,Math.round(total/goal*100));
  const beat = total>=goal;
  document.getElementById('monthlyChalCard').innerHTML=`
    <div class="card-head"><div class="card-title"><span class="dot" style="background:var(--cyan)"></span>🎯 이달 그룹 도전 — 전월 기록 넘기</div>
      <span class="card-sub">${prevYM} 대비 +5% 목표</span></div>
    <div class="chal-goal-bar"><div class="chal-goal-fill" style="width:${pct}%;${beat?'':'background:linear-gradient(90deg,var(--blue),var(--cyan))'}">
      <span class="v" style="${beat?'':'color:#fff'}">${total}일</span></div></div>
    <div class="chal-goal-label">
      <span>목표 ${goal}일 (전월 ${prevTotal}일)</span>
      <span style="color:${beat?'var(--green)':'var(--text2)'};font-weight:700">${beat?'🎉 목표 달성!':`${pct}% · ${goal-total}일 남음`}</span>
    </div>`;
}

function buildLeaderboard(m, prevYM){
  const md=S.monthly[m]||{};
  const prevMd=S.monthly[prevYM]||{};
  const prevRank={};
  Object.entries(prevMd).sort((a,b)=>b[1]-a[1]).forEach(([n],i)=>prevRank[n]=i+1);
  const year=m.slice(0,4);
  const yearCumul={};
  MEMBERS.forEach(n=>{yearCumul[n]=Object.keys(S.monthly).filter(ym=>ym.startsWith(year)&&ym<=m).reduce((s,ym)=>s+(S.monthly[ym]?.[n]||0),0);});
  const sorted=MEMBERS.map(n=>({name:n,count:md[n]||0,cumul:yearCumul[n],target:S.stats.target[n]||0,
    rate:S.stats.target[n]?yearCumul[n]/S.stats.target[n]:0})).sort((a,b)=>b.count-a.count);
  const rows=sorted.map((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const pr=prevRank[p.name];
    let delta='';
    if(pr){const d=pr-(i+1);
      delta=d>0?`<span class="delta up" title="전월 대비 순위 ${d}계단 상승">▲${d}</span>`
        :d<0?`<span class="delta dn" title="전월 대비 순위 ${-d}계단 하락">▼${-d}</span>`
        :`<span class="delta eq" title="전월과 순위 동일">—</span>`;}
    const pct=(p.rate*100).toFixed(1),pn=parseFloat(pct),{c,col}=paceGrade(p.rate);
    const nextChip=nextGradeChip(p.cumul, p.target);
    return `<tr onclick="openMember('${p.name}')">
      <td><span class="rank-badge ${rc}">${i+1}</span></td>
      <td><span class="av-sm" style="background:${avatarColor(p.name)}">${initial(p.name)}</span><b>${p.name}</b></td>
      <td style="font-family:'Archivo',sans-serif;font-weight:800">${p.count}<span style="color:var(--muted);font-size:10px">일</span> ${delta}</td>
      <td><div class="pbar-row"><div class="pbar"><div class="pfill ${c}" style="width:${Math.min(100,pn)}%"></div></div>
        <span class="pct" style="color:${col}">${pct}%</span></div>
        <div class="rate-detail">${p.cumul}/${p.target}일${nextChip}</div></td></tr>`;
  }).join('');
  document.getElementById('lbTable').innerHTML=`<thead><tr><th>#</th><th>이름</th><th>이달</th><th>${year}년 누적 달성률</th></tr></thead><tbody>${rows}</tbody>`;
}
